<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Zone — Place Your World</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --neon: #00FFB2;
    --neon2: #FF2D6B;
    --dark: #080B0F;
    --glass: rgba(255,255,255,0.05);
    --border: rgba(0,255,178,0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: #fff; font-family: 'Syne', sans-serif; height: 100vh; overflow: hidden; user-select: none; }

  #loader {
    position: fixed; inset: 0; background: var(--dark);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.6s ease;
  }
  #loader h1 {
    font-size: clamp(2rem, 6vw, 4rem); font-weight: 800; letter-spacing: -2px;
    background: linear-gradient(135deg, var(--neon), #fff, var(--neon2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  #loader p { color: rgba(255,255,255,0.4); font-family: 'Space Mono', monospace; font-size: 0.75rem; margin-top: 0.5rem; letter-spacing: 3px; }
  .loader-bar { width: 200px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 2rem; border-radius: 99px; overflow: hidden; }
  .loader-bar::after { content: ''; display: block; height: 100%; background: var(--neon); animation: load 1.8s ease forwards; }
  @keyframes load { from { width: 0; } to { width: 100%; } }

  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

  #topbar {
    pointer-events: all; position: absolute; top: 0; left: 0; right: 0;
    padding: 1.2rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(8,11,15,0.9), transparent);
  }
  .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--neon); }
  .pill {
    background: var(--glass); border: 1px solid var(--border); border-radius: 99px;
    padding: 0.35rem 0.9rem; font-family: 'Space Mono', monospace;
    font-size: 0.65rem; color: var(--neon); letter-spacing: 1px; backdrop-filter: blur(10px);
  }

  #status {
    position: absolute; top: 4.5rem; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace; font-size: 0.7rem;
    color: rgba(255,255,255,0.5); letter-spacing: 2px; text-align: center; pointer-events: none;
  }

  #placed-count {
    pointer-events: none; position: absolute; top: 4.5rem; right: 1.5rem;
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    color: rgba(255,255,255,0.4); letter-spacing: 1px;
  }
  #placed-count span { color: var(--neon); font-weight: 700; }

  #reticle-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    opacity: 0; transition: opacity 0.5s;
  }
  #reticle-hint.visible { opacity: 1; }
  .scan-ring {
    width: 80px; height: 80px; border: 2px solid var(--neon); border-radius: 50%;
    position: relative; animation: pulse-ring 2s ease-in-out infinite;
  }
  .scan-ring::before, .scan-ring::after { content: ''; position: absolute; border-radius: 50%; border: 1px solid rgba(0,255,178,0.3); }
  .scan-ring::before { inset: -12px; }
  .scan-ring::after { inset: -24px; }
  @keyframes pulse-ring { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.95); } }
  #reticle-hint p { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: rgba(255,255,255,0.6); letter-spacing: 2px; }

  #tray {
    pointer-events: all; position: absolute; bottom: 0; left: 0; right: 0;
    padding: 1rem 1.5rem 2rem;
    background: linear-gradient(to top, rgba(8,11,15,0.95) 60%, transparent);
  }
  #tray-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.35); letter-spacing: 3px; margin-bottom: 0.8rem; }
  #model-list { display: flex; gap: 0.75rem; overflow-x: auto; scrollbar-width: none; }
  #model-list::-webkit-scrollbar { display: none; }

  .model-card {
    flex-shrink: 0; width: 80px;
    background: var(--glass); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
    padding: 0.6rem; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    backdrop-filter: blur(16px);
  }
  .model-card:hover { transform: translateY(-4px); border-color: var(--border); }
  .model-card.selected { border-color: var(--neon); background: rgba(0,255,178,0.08); transform: translateY(-6px); box-shadow: 0 0 24px rgba(0,255,178,0.2); }
  .model-card .icon { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
  .model-card .name { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: rgba(255,255,255,0.6); text-align: center; }
  .model-card.selected .name { color: var(--neon); }

  #actions {
    pointer-events: all; position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .action-btn {
    width: 52px; height: 52px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(8,11,15,0.85);
    backdrop-filter: blur(10px); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; transition: all 0.2s;
  }
  .action-btn:hover { border-color: var(--neon); box-shadow: 0 0 16px rgba(0,255,178,0.2); transform: scale(1.05); }
  .action-btn.danger:hover { border-color: var(--neon2); box-shadow: 0 0 16px rgba(255,45,107,0.2); }

  #start-ar {
    pointer-events: all; position: absolute; bottom: 10rem; left: 50%; transform: translateX(-50%);
    background: var(--neon); color: #000; border: none;
    padding: 1rem 2.5rem; border-radius: 99px;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
    cursor: pointer; box-shadow: 0 0 40px rgba(0,255,178,0.4);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; display: flex; align-items: center; gap: 0.6rem;
  }
  #start-ar:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 60px rgba(0,255,178,0.6); }
  #start-ar.hidden { display: none; }
  #start-ar.no-ar { background: rgba(255,45,107,0.15); color: #FF2D6B; border: 1px solid #FF2D6B; box-shadow: 0 0 30px rgba(255,45,107,0.2); }

  #toast {
    position: fixed; bottom: 8rem; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(0,255,178,0.12); border: 1px solid var(--neon); border-radius: 99px;
    padding: 0.5rem 1.2rem; font-family: 'Space Mono', monospace; font-size: 0.7rem;
    color: var(--neon); letter-spacing: 1px; opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 999; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
    pointer-events: none; z-index: 9998;
  }
</style>
</head>
<body>

<div id="loader">
  <h1>AR ZONE</h1>
  <p>LOADING SPATIAL ENGINE</p>
  <div class="loader-bar"></div>
</div>

<div id="hud">
  <div id="topbar">
    <div class="logo">AR <span>ZONE</span></div>
    <div class="pill" id="ar-pill">● READY</div>
  </div>
  <div id="status">SELECT A MODEL &amp; ENTER AR</div>
  <div id="placed-count">PLACED: <span id="count">0</span></div>
  <div id="reticle-hint">
    <div class="scan-ring"></div>
    <p>SURFACE DETECTED — TAP TO PLACE</p>
  </div>
  <div id="actions">
    <button class="action-btn" id="btn-undo">↩</button>
    <button class="action-btn" id="btn-scale-up">⊕</button>
    <button class="action-btn" id="btn-scale-dn">⊖</button>
    <button class="action-btn danger" id="btn-clear">✕</button>
  </div>
  <div id="tray">
    <div id="tray-label">SELECT MODEL</div>
    <div id="model-list"></div>
  </div>
  <button id="start-ar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    ENTER AR
  </button>
</div>

<div id="toast"></div>

<script>
// Wait for THREE to be available
(function() {

var MODELS = [
  { id:'cube',    name:'Cube',    emoji:'📦', build:buildCube },
  { id:'sphere',  name:'Sphere',  emoji:'🔮', build:buildSphere },
  { id:'torus',   name:'Torus',   emoji:'🍩', build:buildTorus },
  { id:'rocket',  name:'Rocket',  emoji:'🚀', build:buildRocket },
  { id:'crystal', name:'Crystal', emoji:'💎', build:buildCrystal },
  { id:'pyramid', name:'Pyramid', emoji:'🔺', build:buildPyramid },
  { id:'tree',    name:'Tree',    emoji:'🌲', build:buildTree },
  { id:'ring',    name:'Ring',    emoji:'💍', build:buildRing },
];

function mat(opts) { return new THREE.MeshStandardMaterial(opts); }
function buildCube() {
  var g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2), mat({color:0x4488ff,metalness:0.4,roughness:0.3})));
  return g;
}
function buildSphere() {
  var g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.SphereGeometry(0.12,32,32), mat({color:0xff44aa,metalness:0.6,roughness:0.2})));
  return g;
}
function buildTorus() {
  var g = new THREE.Group();
  var m = new THREE.Mesh(new THREE.TorusGeometry(0.12,0.045,16,40), mat({color:0x44ffaa,metalness:0.5,roughness:0.25}));
  m.rotation.x = Math.PI/2; g.add(m); return g;
}
function buildRocket() {
  var g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.18,12), mat({color:0xff8844,metalness:0.5,roughness:0.2})));
  var nose = new THREE.Mesh(new THREE.ConeGeometry(0.04,0.1,12), mat({color:0xffffff,metalness:0.3,roughness:0.4}));
  nose.position.y = 0.14; g.add(nose);
  var f1 = new THREE.Mesh(new THREE.BoxGeometry(0.01,0.06,0.06), mat({color:0xff4444}));
  f1.position.set(0.05,-0.08,0); g.add(f1);
  var f2 = f1.clone(); f2.position.set(-0.05,-0.08,0); g.add(f2);
  return g;
}
function buildCrystal() {
  var g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.13,0), mat({color:0x88aaff,metalness:0.9,roughness:0.05,transparent:true,opacity:0.85})));
  return g;
}
function buildPyramid() {
  var g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.ConeGeometry(0.14,0.22,4), mat({color:0xffdd44,metalness:0.3,roughness:0.4})));
  return g;
}
function buildTree() {
  var g = new THREE.Group();
  var trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.025,0.1,8), mat({color:0x8B4513}));
  trunk.position.y = -0.06; g.add(trunk);
  var c1 = new THREE.Mesh(new THREE.ConeGeometry(0.1,0.14,8), mat({color:0x2d8a4e})); c1.position.y=0.04; g.add(c1);
  var c2 = new THREE.Mesh(new THREE.ConeGeometry(0.08,0.12,8), mat({color:0x44bb66})); c2.position.y=0.13; g.add(c2);
  return g;
}
function buildRing() {
  var g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.TorusGeometry(0.1,0.02,12,40), mat({color:0xffcc44,metalness:0.9,roughness:0.05})));
  var gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.03), mat({color:0x44aaff,metalness:0.8,roughness:0}));
  gem.position.y=0.1; g.add(gem); return g;
}

// ── STATE ──
var selectedId = MODELS[0].id;
var placedObjects = [];
var hitTestSource = null;
var hitTestRequested = false;
var reticle, renderer, scene, camera;
var xrSession = null;
var xrRefSpace = null;
var currentScale = 1.0;
var previewObjs = [];
var previewActive = false;
var previewRAF = null;

// ── INIT ──
function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 20);

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  renderer.shadowMap.enabled = true;

  var canvas = renderer.domElement;
  canvas.style.cssText = 'position:fixed;inset:0;z-index:1;width:100%;height:100%;';
  document.body.appendChild(canvas);

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  var sun = new THREE.DirectionalLight(0xffffff, 1.2);
  sun.position.set(2,4,3); sun.castShadow = true; scene.add(sun);
  var fill = new THREE.PointLight(0x00ffb2, 0.8, 4);
  fill.position.set(-1,1,-1); scene.add(fill);

  var rGeo = new THREE.RingGeometry(0.06, 0.08, 32).rotateX(-Math.PI/2);
  reticle = new THREE.Mesh(rGeo, new THREE.MeshBasicMaterial({color:0x00FFB2}));
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  window.addEventListener('resize', function() {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

// ── AR ──
function startAR() {
  navigator.xr.isSessionSupported('immersive-ar').then(function(ok) {
    if (!ok) { toast('⚠ WebXR AR not supported here'); return; }
    navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay','light-estimation'],
      domOverlay: { root: document.getElementById('hud') }
    }).then(function(session) {
      xrSession = session;
      renderer.xr.setReferenceSpaceType('local');
      renderer.xr.setSession(session).then(function() {
        session.requestReferenceSpace('local').then(function(rs) {
          xrRefSpace = rs;
        });
      });

      session.addEventListener('end', function() {
        hitTestRequested = false; hitTestSource = null; xrSession = null;
        document.getElementById('start-ar').classList.remove('hidden');
        document.getElementById('ar-pill').textContent = '● READY';
        setStatus('SELECT A MODEL &amp; ENTER AR');
        setHint(false);
        startPreview();
      });
      session.addEventListener('select', onSelect);

      // Stop preview
      previewActive = false;
      if (previewRAF) cancelAnimationFrame(previewRAF);
      previewObjs.forEach(function(o){ scene.remove(o); });
      previewObjs = [];

      document.getElementById('start-ar').classList.add('hidden');
      document.getElementById('ar-pill').textContent = '● AR ACTIVE';
      setStatus('SCANNING FOR SURFACES...');
      renderer.setAnimationLoop(arLoop);
    }).catch(function(e){ toast('AR error: ' + e.message); });
  }).catch(function(){ toast('⚠ WebXR not available'); });
}

function arLoop(ts, frame) {
  if (!frame) { renderer.render(scene, camera); return; }

  if (!hitTestRequested) {
    xrSession.requestReferenceSpace('viewer').then(function(vs) {
      xrSession.requestHitTestSource({ space:vs }).then(function(src) {
        hitTestSource = src;
      });
    });
    hitTestRequested = true;
  }

  if (hitTestSource) {
    var hits = frame.getHitTestResults(hitTestSource);
    if (hits.length) {
      var pose = hits[0].getPose(xrRefSpace);
      reticle.visible = true;
      reticle.matrix.fromArray(pose.transform.matrix);
      setStatus('SURFACE FOUND — TAP TO PLACE');
      setHint(true);
    } else {
      reticle.visible = false;
      setStatus('SCANNING FOR SURFACES...');
      setHint(false);
    }
  }

  var t = performance.now()*0.001;
  placedObjects.forEach(function(o,i) {
    o.rotation.y += 0.005;
    o.position.y = o.userData.baseY + Math.sin(t*1.5+i)*0.01;
  });

  renderer.render(scene, camera);
}

function onSelect() {
  if (!reticle.visible) return;
  var def = MODELS.find(function(m){ return m.id===selectedId; });
  var obj = def.build();
  var pos = new THREE.Vector3();
  var quat = new THREE.Quaternion();
  var scl = new THREE.Vector3();
  reticle.matrix.decompose(pos, quat, scl);
  obj.position.copy(pos);
  obj.quaternion.copy(quat);
  obj.position.y += 0.1;
  obj.userData.baseY = obj.position.y;
  obj.scale.setScalar(0);
  scene.add(obj);
  placedObjects.push(obj);

  var s=0, target=currentScale;
  var iv = setInterval(function(){
    s = Math.min(s+0.08, 1);
    obj.scale.setScalar(target*s);
    if (s>=1) clearInterval(iv);
  }, 16);

  updateCount();
  toast(def.emoji + ' ' + def.name.toUpperCase() + ' PLACED');
}

// ── PREVIEW ──
function startPreview() {
  previewActive = true;
  previewObjs = [];
  MODELS.forEach(function(m,i) {
    var obj = m.build();
    var a = (i/MODELS.length)*Math.PI*2;
    obj.position.set(Math.cos(a)*1.4, 0, Math.sin(a)*1.4 - 4);
    obj.userData.angle = a; obj.scale.setScalar(0.85);
    scene.add(obj); previewObjs.push(obj);
  });
  camera.position.set(0, 0.5, 0);
  camera.lookAt(0,0,-4);

  var t=0;
  function loop() {
    if (!previewActive) return;
    previewRAF = requestAnimationFrame(loop);
    t += 0.005;
    previewObjs.forEach(function(o,i){
      o.rotation.y += 0.012;
      o.position.y = Math.sin(t*1.2+i)*0.12;
    });
    renderer.render(scene, camera);
  }
  loop();
}

// ── HELPERS ──
function setStatus(msg) { document.getElementById('status').innerHTML = msg; }
function setHint(v) { document.getElementById('reticle-hint').classList.toggle('visible', v); }
function updateCount() { document.getElementById('count').textContent = placedObjects.length; }
var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ── TRAY ──
function buildTray() {
  var list = document.getElementById('model-list');
  MODELS.forEach(function(m) {
    var card = document.createElement('div');
    card.className = 'model-card' + (m.id===selectedId ? ' selected' : '');
    card.innerHTML = '<div class="icon">'+m.emoji+'</div><div class="name">'+m.name+'</div>';
    card.onclick = function() {
      document.querySelectorAll('.model-card').forEach(function(c){ c.classList.remove('selected'); });
      card.classList.add('selected');
      selectedId = m.id;
      toast(m.emoji+' '+m.name.toUpperCase()+' SELECTED');
    };
    list.appendChild(card);
  });
}

// ── BUTTONS ──
function bindButtons() {
  document.getElementById('btn-undo').onclick = function() {
    if (!placedObjects.length) return;
    scene.remove(placedObjects.pop()); updateCount(); toast('↩ REMOVED');
  };
  document.getElementById('btn-scale-up').onclick = function() {
    currentScale = Math.min(currentScale+0.25, 3);
    toast('SCALE: '+currentScale.toFixed(1)+'×');
  };
  document.getElementById('btn-scale-dn').onclick = function() {
    currentScale = Math.max(currentScale-0.25, 0.25);
    toast('SCALE: '+currentScale.toFixed(1)+'×');
  };
  document.getElementById('btn-clear').onclick = function() {
    placedObjects.forEach(function(o){ scene.remove(o); });
    placedObjects = []; updateCount(); toast('✕ ALL CLEARED');
  };
  document.getElementById('start-ar').onclick = function() {
    if (navigator.xr) { startAR(); }
    else { toast('⚠ WebXR not supported in this browser'); }
  };
}

// ── BOOT ──
window.addEventListener('DOMContentLoaded', function() {
  try {
    init();
    buildTray();
    bindButtons();

    // Check AR availability and update button
    if (navigator.xr) {
      navigator.xr.isSessionSupported('immersive-ar').then(function(ok) {
        if (!ok) {
          var btn = document.getElementById('start-ar');
          btn.innerHTML = '⚠ AR NOT AVAILABLE';
          btn.classList.add('no-ar');
          document.getElementById('ar-pill').textContent = '● NO WEBXR';
          document.getElementById('ar-pill').style.color = '#FF2D6B';
        }
      });
    } else {
      var btn = document.getElementById('start-ar');
      btn.innerHTML = '⚠ AR NOT AVAILABLE';
      btn.classList.add('no-ar');
      document.getElementById('ar-pill').textContent = '● NO WEBXR';
      document.getElementById('ar-pill').style.color = '#FF2D6B';
    }

    startPreview();

    setTimeout(function() {
      var ld = document.getElementById('loader');
      ld.style.opacity = '0';
      setTimeout(function(){ ld.remove(); }, 600);
    }, 1800);

  } catch(e) {
    document.getElementById('loader').innerHTML =
      '<h1 style="color:#FF2D6B;font-size:2rem">ERROR</h1>' +
      '<p style="color:rgba(255,255,255,0.5);margin-top:1rem;font-family:monospace;font-size:0.8rem">' + e.message + '</p>';
    console.error(e);
  }
});

})();
</script>
</body>
</html>
