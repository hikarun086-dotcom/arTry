<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Zone — Place Your World</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --neon: #00FFB2;
    --neon2: #FF2D6B;
    --dark: #080B0F;
    --mid: #111418;
    --glass: rgba(255,255,255,0.05);
    --border: rgba(0,255,178,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: #fff;
    font-family: 'Syne', sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ─── LOADING SCREEN ─── */
  #loader {
    position: fixed; inset: 0;
    background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease;
  }
  #loader h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--neon), #fff, var(--neon2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #loader p { color: rgba(255,255,255,0.4); font-family: 'Space Mono', monospace; font-size: 0.75rem; margin-top: 0.5rem; letter-spacing: 3px; }
  .loader-bar {
    width: 200px; height: 2px;
    background: rgba(255,255,255,0.1);
    margin-top: 2rem;
    border-radius: 99px;
    overflow: hidden;
  }
  .loader-bar::after {
    content: '';
    display: block;
    height: 100%;
    background: var(--neon);
    animation: load 1.8s ease forwards;
    transform-origin: left;
  }
  @keyframes load { from { width: 0; } to { width: 100%; } }

  /* ─── CANVAS / 3D SCENE ─── */
  canvas#scene {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* ─── AR NOT SUPPORTED FALLBACK ─── */
  #no-ar {
    display: none;
    position: fixed; inset: 0;
    background: var(--dark);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
    text-align: center; padding: 2rem;
  }
  #no-ar h2 { font-size: 1.8rem; font-weight: 800; }
  #no-ar p { color: rgba(255,255,255,0.5); font-family: 'Space Mono', monospace; font-size: 0.8rem; line-height: 1.8; }

  /* ─── HUD OVERLAY ─── */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 100;
  }

  /* Top bar */
  #topbar {
    pointer-events: all;
    position: absolute; top: 0; left: 0; right: 0;
    padding: 1.2rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(8,11,15,0.9), transparent);
  }
  #topbar .logo {
    font-weight: 800; font-size: 1.2rem;
    letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  #topbar .logo span { color: var(--neon); }
  .pill {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 0.35rem 0.9rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--neon);
    letter-spacing: 1px;
    backdrop-filter: blur(10px);
  }

  /* Status indicator */
  #status {
    position: absolute; top: 4.5rem; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-align: center;
    transition: all 0.3s;
    pointer-events: none;
  }
  #status.active { color: var(--neon); }

  /* Reticle hint */
  #reticle-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #reticle-hint.visible { opacity: 1; }
  .scan-ring {
    width: 80px; height: 80px;
    border: 2px solid var(--neon);
    border-radius: 50%;
    position: relative;
    animation: pulse-ring 2s ease-in-out infinite;
  }
  .scan-ring::before, .scan-ring::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0,255,178,0.3);
  }
  .scan-ring::before { inset: -12px; }
  .scan-ring::after { inset: -24px; }
  @keyframes pulse-ring {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.95); }
  }
  #reticle-hint p {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
  }

  /* Model picker tray */
  #tray {
    pointer-events: all;
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 1rem 1.5rem 2rem;
    background: linear-gradient(to top, rgba(8,11,15,0.95) 60%, transparent);
  }
  #tray-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 3px;
    margin-bottom: 0.8rem;
    padding-left: 4px;
  }
  #model-list {
    display: flex; gap: 0.75rem; overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0.25rem;
  }
  #model-list::-webkit-scrollbar { display: none; }

  .model-card {
    flex-shrink: 0;
    width: 80px;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 0.6rem;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .model-card:hover { transform: translateY(-4px); border-color: var(--border); }
  .model-card.selected {
    border-color: var(--neon);
    background: rgba(0,255,178,0.08);
    transform: translateY(-6px);
    box-shadow: 0 0 24px rgba(0,255,178,0.2);
  }
  .model-card .icon {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    filter: drop-shadow(0 0 8px rgba(0,255,178,0.3));
  }
  .model-card .name {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.3;
  }
  .model-card.selected .name { color: var(--neon); }

  /* Action buttons */
  #actions {
    pointer-events: all;
    position: absolute; right: 1.5rem;
    top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .action-btn {
    width: 52px; height: 52px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(8,11,15,0.8);
    backdrop-filter: blur(10px);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    transition: all 0.2s;
  }
  .action-btn:hover {
    border-color: var(--neon);
    box-shadow: 0 0 16px rgba(0,255,178,0.2);
    transform: scale(1.05);
  }
  .action-btn.danger:hover {
    border-color: var(--neon2);
    box-shadow: 0 0 16px rgba(255,45,107,0.2);
  }
  .action-btn[title]:hover::after {
    content: attr(title);
    position: absolute;
    right: calc(100% + 10px);
    background: var(--mid);
    border: 1px solid var(--border);
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    white-space: nowrap;
    color: var(--neon);
    letter-spacing: 1px;
    pointer-events: none;
  }
  .action-btn { position: relative; }

  /* Start AR button */
  #start-ar {
    pointer-events: all;
    position: absolute; bottom: 10rem; left: 50%; transform: translateX(-50%);
    background: var(--neon);
    color: #000;
    border: none;
    padding: 1rem 2.5rem;
    border-radius: 99px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 0 40px rgba(0,255,178,0.4);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    display: flex; align-items: center; gap: 0.6rem;
  }
  #start-ar:hover {
    transform: translateX(-50%) scale(1.05);
    box-shadow: 0 0 60px rgba(0,255,178,0.6);
  }
  #start-ar:active { transform: translateX(-50%) scale(0.97); }
  #start-ar.hidden { display: none; }

  /* Placed count badge */
  #placed-count {
    pointer-events: none;
    position: absolute; top: 4.5rem; right: 1.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  #placed-count span { color: var(--neon); font-weight: 700; }

  /* Preview 3D canvas (non-AR mode) */
  #preview-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
  }

  /* Toast notification */
  #toast {
    position: fixed; bottom: 8rem; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(0,255,178,0.15);
    border: 1px solid var(--neon);
    border-radius: 99px;
    padding: 0.5rem 1.2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--neon);
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <h1>AR ZONE</h1>
  <p>LOADING SPATIAL ENGINE</p>
  <div class="loader-bar"></div>
</div>

<!-- No AR fallback -->
<div id="no-ar">
  <h2>WebXR Not Available</h2>
  <p>Your browser or device doesn't support WebXR AR.<br>Try Chrome on Android with ARCore,<br>or explore the 3D preview below.</p>
  <canvas id="preview-canvas"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <div id="topbar">
    <div class="logo">AR <span>ZONE</span></div>
    <div class="pill" id="ar-pill">● READY</div>
  </div>

  <div id="status">POINT CAMERA AT A FLAT SURFACE</div>

  <div id="placed-count">PLACED: <span id="count">0</span></div>

  <div id="reticle-hint">
    <div class="scan-ring"></div>
    <p>SURFACE DETECTED — TAP TO PLACE</p>
  </div>

  <div id="actions">
    <button class="action-btn" title="UNDO LAST" id="btn-undo">↩</button>
    <button class="action-btn" title="SCALE UP" id="btn-scale-up">⊕</button>
    <button class="action-btn" title="SCALE DOWN" id="btn-scale-dn">⊖</button>
    <button class="action-btn danger" title="CLEAR ALL" id="btn-clear">✕</button>
  </div>

  <div id="tray">
    <div id="tray-label">SELECT MODEL</div>
    <div id="model-list">
      <!-- filled by JS -->
    </div>
  </div>

  <button id="start-ar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    ENTER AR
  </button>
</div>

<div id="toast"></div>

<script type="module">
// ─── Three.js via CDN ───────────────────────────────────────────────
import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';

// ─── MODEL LIBRARY ──────────────────────────────────────────────────
const MODELS = [
  { id: 'cube',     name: 'Cube',      emoji: '📦', color: 0x4488ff, build: buildCube },
  { id: 'sphere',   name: 'Sphere',    emoji: '🔮', color: 0xff44aa, build: buildSphere },
  { id: 'torus',    name: 'Torus',     emoji: '🍩', color: 0x44ffaa, build: buildTorus },
  { id: 'rocket',   name: 'Rocket',    emoji: '🚀', color: 0xff8844, build: buildRocket },
  { id: 'crystal',  name: 'Crystal',   emoji: '💎', color: 0x88aaff, build: buildCrystal },
  { id: 'pyramid',  name: 'Pyramid',   emoji: '🔺', color: 0xffdd44, build: buildPyramid },
  { id: 'tree',     name: 'Tree',      emoji: '🌲', color: 0x44bb66, build: buildTree },
  { id: 'ring',     name: 'Ring',      emoji: '💍', color: 0xffcc44, build: buildRing },
];

// ─── MODEL BUILDERS ─────────────────────────────────────────────────
function buildCube() {
  const g = new THREE.Group();
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 0.2, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x4488ff, metalness: 0.4, roughness: 0.3 })
  );
  g.add(mesh); return g;
}
function buildSphere() {
  const g = new THREE.Group();
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0xff44aa, metalness: 0.6, roughness: 0.2 })
  );
  g.add(mesh); return g;
}
function buildTorus() {
  const g = new THREE.Group();
  const mesh = new THREE.Mesh(
    new THREE.TorusGeometry(0.12, 0.045, 16, 40),
    new THREE.MeshStandardMaterial({ color: 0x44ffaa, metalness: 0.5, roughness: 0.25 })
  );
  mesh.rotation.x = Math.PI / 2;
  g.add(mesh); return g;
}
function buildRocket() {
  const g = new THREE.Group();
  // Body
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, 0.18, 12),
    new THREE.MeshStandardMaterial({ color: 0xff8844, metalness: 0.5, roughness: 0.2 })
  );
  // Nose
  const nose = new THREE.Mesh(
    new THREE.ConeGeometry(0.04, 0.1, 12),
    new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.3, roughness: 0.4 })
  );
  nose.position.y = 0.14;
  // Fin
  const fin1 = new THREE.Mesh(
    new THREE.BoxGeometry(0.01, 0.06, 0.06),
    new THREE.MeshStandardMaterial({ color: 0xff4444 })
  );
  fin1.position.set(0.05, -0.08, 0);
  const fin2 = fin1.clone(); fin2.position.set(-0.05, -0.08, 0);
  g.add(body, nose, fin1, fin2);
  return g;
}
function buildCrystal() {
  const g = new THREE.Group();
  const mesh = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.13, 0),
    new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.9, roughness: 0.05, transparent: true, opacity: 0.85 })
  );
  g.add(mesh); return g;
}
function buildPyramid() {
  const g = new THREE.Group();
  const mesh = new THREE.Mesh(
    new THREE.ConeGeometry(0.14, 0.22, 4),
    new THREE.MeshStandardMaterial({ color: 0xffdd44, metalness: 0.3, roughness: 0.4 })
  );
  g.add(mesh); return g;
}
function buildTree() {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02, 0.025, 0.1, 8),
    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
  );
  trunk.position.y = -0.06;
  const canopy1 = new THREE.Mesh(
    new THREE.ConeGeometry(0.1, 0.14, 8),
    new THREE.MeshStandardMaterial({ color: 0x2d8a4e })
  );
  canopy1.position.y = 0.04;
  const canopy2 = new THREE.Mesh(
    new THREE.ConeGeometry(0.08, 0.12, 8),
    new THREE.MeshStandardMaterial({ color: 0x44bb66 })
  );
  canopy2.position.y = 0.13;
  g.add(trunk, canopy1, canopy2); return g;
}
function buildRing() {
  const g = new THREE.Group();
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.1, 0.02, 12, 40),
    new THREE.MeshStandardMaterial({ color: 0xffcc44, metalness: 0.9, roughness: 0.05 })
  );
  const gem = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.03),
    new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.8, roughness: 0.0 })
  );
  gem.position.y = 0.1;
  g.add(ring, gem); return g;
}

// ─── STATE ──────────────────────────────────────────────────────────
let selectedModelId = MODELS[0].id;
let placedObjects = [];
let hitTestSource = null;
let hitTestSourceRequested = false;
let reticle;
let xrSession = null;
let xrRefSpace = null;
let renderer, scene, camera;
let currentScale = 1.0;
let arSupported = false;

// ─── INIT SCENE ─────────────────────────────────────────────────────
function initScene() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(2, 4, 3);
  dir.castShadow = true;
  scene.add(dir);
  const fill = new THREE.PointLight(0x00ffb2, 0.8, 3);
  fill.position.set(-1, 1, -1);
  scene.add(fill);

  // Reticle
  const reticleGeo = new THREE.RingGeometry(0.06, 0.08, 32).rotateX(-Math.PI / 2);
  const reticleMat = new THREE.MeshBasicMaterial({ color: 0x00FFB2 });
  reticle = new THREE.Mesh(reticleGeo, reticleMat);
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ─── CHECK AR SUPPORT ───────────────────────────────────────────────
async function checkARSupport() {
  if (navigator.xr) {
    arSupported = await navigator.xr.isSessionSupported('immersive-ar');
  }
  return arSupported;
}

// ─── START AR ───────────────────────────────────────────────────────
async function startAR() {
  if (!arSupported) { toast('WebXR AR not supported on this device'); return; }
  
  xrSession = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay', 'light-estimation'],
    domOverlay: { root: document.getElementById('hud') }
  });

  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(xrSession);

  xrRefSpace = await xrSession.requestReferenceSpace('local');

  xrSession.addEventListener('end', () => {
    hitTestSourceRequested = false;
    hitTestSource = null;
    xrSession = null;
    document.getElementById('start-ar').classList.remove('hidden');
    document.getElementById('ar-pill').textContent = '● READY';
    setStatus('POINT CAMERA AT A FLAT SURFACE');
    setReticleHint(false);
  });

  // Select = place model
  xrSession.addEventListener('select', onSelect);

  document.getElementById('start-ar').classList.add('hidden');
  document.getElementById('ar-pill').textContent = '● AR ACTIVE';
  setStatus('SCANNING FOR SURFACES...');

  renderer.setAnimationLoop(render);
}

// ─── RENDER LOOP ────────────────────────────────────────────────────
function render(timestamp, frame) {
  if (frame) {
    // Hit test setup
    if (!hitTestSourceRequested) {
      xrSession.requestReferenceSpace('viewer').then(refSpace => {
        xrSession.requestHitTestSource({ space: refSpace }).then(src => {
          hitTestSource = src;
        });
      });
      hitTestSourceRequested = true;
    }

    if (hitTestSource) {
      const results = frame.getHitTestResults(hitTestSource);
      if (results.length > 0) {
        const hit = results[0];
        const pose = hit.getPose(xrRefSpace);
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
        setStatus('SURFACE FOUND — TAP TO PLACE');
        setReticleHint(true);
      } else {
        reticle.visible = false;
        setStatus('SCANNING FOR SURFACES...');
        setReticleHint(false);
      }
    }
  }

  // Animate placed objects
  const t = performance.now() * 0.001;
  placedObjects.forEach((obj, i) => {
    obj.rotation.y += 0.005;
    obj.position.y = obj.userData.baseY + Math.sin(t * 1.5 + i) * 0.01;
  });

  renderer.render(scene, camera);
}

// ─── PLACE MODEL ────────────────────────────────────────────────────
function onSelect() {
  if (!reticle.visible) return;

  const modelDef = MODELS.find(m => m.id === selectedModelId);
  const obj = modelDef.build();
  
  obj.scale.setScalar(currentScale);
  reticle.matrix.decompose(obj.position, obj.quaternion, new THREE.Vector3());
  obj.position.y += 0.1; // float above surface
  obj.userData.baseY = obj.position.y;

  // Entry animation via userData
  obj.scale.setScalar(0);
  scene.add(obj);
  placedObjects.push(obj);
  
  // Animate in
  let s = 0;
  const target = currentScale;
  const grow = setInterval(() => {
    s += 0.08;
    if (s >= 1) { s = 1; clearInterval(grow); }
    obj.scale.setScalar(target * s);
  }, 16);

  updateCount();
  toast(`${modelDef.emoji} ${modelDef.name.toUpperCase()} PLACED`);
}

// ─── HELPERS ────────────────────────────────────────────────────────
function setStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
}
function setReticleHint(visible) {
  document.getElementById('reticle-hint').classList.toggle('visible', visible);
}
function updateCount() {
  document.getElementById('count').textContent = placedObjects.length;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── BUILD TRAY UI ──────────────────────────────────────────────────
function buildTray() {
  const list = document.getElementById('model-list');
  MODELS.forEach(m => {
    const card = document.createElement('div');
    card.className = 'model-card' + (m.id === selectedModelId ? ' selected' : '');
    card.innerHTML = `<div class="icon">${m.emoji}</div><div class="name">${m.name}</div>`;
    card.addEventListener('click', () => {
      document.querySelectorAll('.model-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedModelId = m.id;
    });
    list.appendChild(card);
  });
}

// ─── ACTION BUTTONS ─────────────────────────────────────────────────
function bindActions() {
  document.getElementById('btn-undo').addEventListener('click', () => {
    if (placedObjects.length === 0) return;
    const last = placedObjects.pop();
    scene.remove(last);
    updateCount();
    toast('↩ LAST OBJECT REMOVED');
  });
  document.getElementById('btn-scale-up').addEventListener('click', () => {
    currentScale = Math.min(currentScale + 0.25, 3);
    toast(`SCALE: ${currentScale.toFixed(1)}×`);
  });
  document.getElementById('btn-scale-dn').addEventListener('click', () => {
    currentScale = Math.max(currentScale - 0.25, 0.25);
    toast(`SCALE: ${currentScale.toFixed(1)}×`);
  });
  document.getElementById('btn-clear').addEventListener('click', () => {
    placedObjects.forEach(o => scene.remove(o));
    placedObjects = [];
    updateCount();
    toast('✕ ALL CLEARED');
  });
  document.getElementById('start-ar').addEventListener('click', startAR);
}

// ─── NON-AR PREVIEW (fallback / pre-launch) ────────────────────────
function startPreviewLoop() {
  let t = 0;
  const previewObjs = [];
  MODELS.forEach((m, i) => {
    const obj = m.build();
    const angle = (i / MODELS.length) * Math.PI * 2;
    obj.position.set(Math.cos(angle) * 1.5, 0, Math.sin(angle) * 1.5 - 4);
    obj.userData.angle = angle;
    scene.add(obj);
    previewObjs.push(obj);
  });
  camera.position.set(0, 0.8, 0);
  camera.lookAt(0, 0, -4);

  function loop() {
    if (xrSession) return;
    requestAnimationFrame(loop);
    t += 0.005;
    previewObjs.forEach((o, i) => {
      o.rotation.y += 0.01;
      o.position.y = Math.sin(t + i) * 0.15;
    });
    renderer.render(scene, camera);
  }
  loop();
}

// ─── BOOT ───────────────────────────────────────────────────────────
async function boot() {
  initScene();
  buildTray();
  bindActions();

  const supported = await checkARSupport();
  
  // Hide loader
  setTimeout(() => {
    const loader = document.getElementById('loader');
    loader.style.opacity = '0';
    setTimeout(() => loader.remove(), 600);
  }, 1800);

  if (!supported) {
    document.getElementById('start-ar').innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      AR NOT AVAILABLE`;
    document.getElementById('start-ar').style.background = 'rgba(255,45,107,0.2)';
    document.getElementById('start-ar').style.color = '#FF2D6B';
    document.getElementById('start-ar').style.border = '1px solid #FF2D6B';
    document.getElementById('start-ar').style.boxShadow = '0 0 40px rgba(255,45,107,0.3)';
    document.getElementById('ar-pill').textContent = '● NO WEBXR';
    document.getElementById('ar-pill').style.color = '#FF2D6B';
    document.getElementById('ar-pill').style.borderColor = 'rgba(255,45,107,0.3)';
    toast('Try Chrome on Android with ARCore');
  }

  startPreviewLoop();
}

boot();
</script>
