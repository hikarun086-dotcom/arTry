<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MIRA AR Zone</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ──────────────────────────────────────────── */
:root{
  --accent:#2D6A4F;   /* deep green */
  --accent2:#52B788;  /* soft green */
  --bg:#FFFFFF;
  --dark:#111827;
  --mid:#6B7280;
  --light:#F9FAFB;
  --border:#E5E7EB;
  --glass:rgba(255,255,255,.88);
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#111;font-family:'Inter',sans-serif;height:100vh;overflow:hidden;user-select:none;}

/* ── LOADER ──────────────────────────────────────────────────*/
#loader{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
#loader-logo{font-size:1.8rem;font-weight:700;color:var(--dark);letter-spacing:-1px;}
#loader-logo span{color:var(--accent);}
#loader-sub{font-size:.7rem;color:var(--mid);letter-spacing:2px;margin-top:.3rem;}
#loader-bar{width:120px;height:2px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:1.6rem;}
#loader-fill{height:100%;background:var(--accent);width:0;transition:width .08s;}

/* ── HUD ────────────────────────────────────────────────────*/
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;}

/* ── TOP BAR ─────────────────────────────────────────────── */
#topbar{
  pointer-events:all;
  position:absolute;top:0;left:0;right:0;
  padding:.8rem 1rem;
  background:var(--glass);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.3);
  display:flex;align-items:center;gap:.6rem;
}
#logo{font-size:.95rem;font-weight:700;color:var(--dark);flex:1;letter-spacing:-.4px;}
#logo span{color:var(--accent);}
#surf-pill{
  font-size:.6rem;font-weight:600;letter-spacing:.5px;
  border-radius:99px;padding:.22rem .7rem;border:1.5px solid;
  transition:all .3s;flex-shrink:0;display:none;
}
#surf-pill.show{display:block;}
#surf-pill.floor{color:var(--accent);border-color:var(--accent2);background:rgba(82,183,136,.08);}
#surf-pill.wall{color:#B45309;border-color:#F59E0B;background:rgba(245,158,11,.08);}
#surf-pill.ceiling{color:#1D4ED8;border-color:#60A5FA;background:rgba(96,165,250,.08);}
#ar-btn{
  background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
  padding:.5rem 1rem;font-family:'Inter',sans-serif;font-weight:600;font-size:.75rem;
  cursor:pointer;touch-action:manipulation;transition:all .2s;white-space:nowrap;
  display:flex;align-items:center;gap:.35rem;flex-shrink:0;
}
#ar-btn:active{transform:scale(.95);}
#ar-btn.gone{display:none;}
#ar-btn.na{background:rgba(239,68,68,.1);color:#EF4444;border:1.5px solid #EF4444;}

/* ── MODE BAR ────────────────────────────────────────────── */
#mode-bar{
  pointer-events:all;
  position:absolute;top:3.6rem;left:50%;transform:translateX(-50%);
  display:none;gap:0;background:var(--glass);backdrop-filter:blur(12px);
  border-radius:99px;border:1px solid var(--border);overflow:hidden;
  box-shadow:var(--shadow);
}
#mode-bar.show{display:flex;}
.mbt{
  font-size:.65rem;font-weight:600;letter-spacing:.3px;padding:.4rem 1.1rem;
  border:none;background:transparent;color:var(--mid);cursor:pointer;touch-action:manipulation;transition:all .2s;
}
.mbt.on{background:var(--accent);color:#fff;}

/* ── SCAN UI ─────────────────────────────────────────────── */
#scan-ui{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:.9rem;
  opacity:0;transition:opacity .4s;
}
#scan-ui.show{opacity:1;}
.scan-rings{position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center;}
.sring{position:absolute;border-radius:50%;border:1.5px solid rgba(255,255,255,.7);animation:rp 2s ease-in-out infinite;}
.sr1{width:28px;height:28px;}.sr2{width:50px;height:50px;animation-delay:.2s;opacity:.55;}.sr3{width:72px;height:72px;animation-delay:.4s;opacity:.25;}
@keyframes rp{0%,100%{transform:scale(1);}50%{transform:scale(.88);opacity:.2;}}
.scan-dot{width:8px;height:8px;border-radius:50%;background:#fff;}
#scan-lbl{font-size:.65rem;color:rgba(255,255,255,.7);letter-spacing:1.5px;text-align:center;line-height:1.9;font-weight:500;}

/* ── TAP / GRAB HINTS ────────────────────────────────────── */
#tap-hint,#grab-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:.6rem;
  opacity:0;transition:opacity .4s;
}
#tap-hint.show,#grab-hint.show{opacity:1;}
.hint-ring{
  width:48px;height:48px;border-radius:50%;
  border:2px solid #fff;
  animation:ping 1.6s ease-out infinite;
}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(255,255,255,.45);}70%{box-shadow:0 0 0 18px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
.hint-ring.green{border-color:var(--accent2);animation-name:ping-g;}
@keyframes ping-g{0%{box-shadow:0 0 0 0 rgba(82,183,136,.5);}70%{box-shadow:0 0 0 18px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
.hint-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-size:1.2rem;}
.hint-lbl{font-size:.6rem;color:rgba(255,255,255,.85);letter-spacing:1.5px;font-weight:600;text-align:center;}

/* ── BOTTOM PANEL (place mode info) ─────────────────────── */
#place-panel{
  pointer-events:all;
  position:absolute;bottom:9.5rem;left:.9rem;right:.9rem;
  display:none;
  background:var(--glass);backdrop-filter:blur(14px);
  border-radius:var(--radius);border:1px solid var(--border);
  padding:.8rem 1rem;box-shadow:var(--shadow);
}
#place-panel.show{display:block;}
#pp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
#pp-name{font-size:.9rem;font-weight:700;color:var(--dark);}
#pp-price{font-size:1rem;font-weight:700;color:var(--accent);}
#pp-dims{font-size:.62rem;color:var(--mid);margin-top:.15rem;}
#pp-surface{
  font-size:.58rem;font-weight:600;border-radius:99px;padding:.18rem .55rem;
  border:1px solid;margin-top:.3rem;display:inline-block;
}
#pp-surface.floor{color:var(--accent);border-color:var(--accent2);background:rgba(82,183,136,.08);}
#pp-surface.wall{color:#B45309;border-color:#F59E0B;background:rgba(245,158,11,.08);}
#pp-surface.ceiling{color:#1D4ED8;border-color:#60A5FA;background:rgba(96,165,250,.08);}

/* Variants */
#pp-variants{display:flex;gap:.4rem;margin:.55rem 0 .6rem;}
.vdot{
  width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:2px solid var(--border);transition:all .15s;touch-action:manipulation;
}
.vdot.on{border-color:var(--dark);box-shadow:0 0 0 2px rgba(0,0,0,.15);}

/* Action buttons */
#pp-actions{display:flex;gap:.5rem;}
.pp-btn{
  flex:1;border:none;border-radius:9px;padding:.55rem;
  font-family:'Inter',sans-serif;font-weight:600;font-size:.72rem;
  cursor:pointer;touch-action:manipulation;transition:all .2s;
}
.pp-btn:active{transform:scale(.95);}
#btn-add-cart{background:var(--accent);color:#fff;}
#btn-wishlist{background:var(--light);color:var(--dark);border:1px solid var(--border);}
#btn-wishlist.wished{background:#FFF0F0;color:#EF4444;border-color:#FCA5A5;}

/* rotate hint */
#rotate-hint{font-size:.58rem;color:var(--mid);text-align:center;margin-top:.5rem;}

/* ── BOTTOM TRAY ─────────────────────────────────────────── */
#tray{
  pointer-events:all;
  position:absolute;bottom:0;left:0;right:0;
  background:var(--glass);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  padding:.65rem .9rem calc(env(safe-area-inset-bottom,0px)+.65rem);
}
#tray-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;}
#tray-label{font-size:.6rem;font-weight:600;color:var(--mid);letter-spacing:1px;}
#tray-right{display:flex;gap:.5rem;align-items:center;}
#placed-lbl{font-size:.6rem;color:var(--mid);}
#placed-lbl strong{color:var(--accent);}
#list-btn{
  font-size:.6rem;font-weight:600;color:var(--accent);background:rgba(45,106,79,.08);
  border:1px solid rgba(45,106,79,.2);border-radius:6px;padding:.22rem .6rem;
  cursor:pointer;touch-action:manipulation;display:flex;align-items:center;gap:.3rem;
}
#cards{display:flex;gap:.45rem;overflow-x:auto;scrollbar-width:none;padding-bottom:.05rem;}
#cards::-webkit-scrollbar{display:none;}
.card{
  flex-shrink:0;width:68px;
  background:#fff;border:1.5px solid var(--border);
  border-radius:10px;padding:.4rem .3rem;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:.2rem;
  touch-action:manipulation;transition:all .18s;
}
.card:active{transform:scale(.92);}
.card.sel{border-color:var(--accent);background:rgba(45,106,79,.05);}
.card .cem{font-size:1.25rem;line-height:1;}
.card .cnm{font-size:.42rem;color:var(--mid);text-align:center;font-weight:500;line-height:1.3;}
.card .cpr{font-size:.44rem;color:var(--accent);font-weight:700;}
.card .cdot{width:5px;height:5px;border-radius:50%;}
.card .cdot.floor{background:var(--accent2);}
.card .cdot.wall{background:#F59E0B;}
.card .cdot.ceiling{background:#60A5FA;}
.card.sel .cnm{color:var(--accent);}

/* ── RIGHT RAIL ──────────────────────────────────────────── */
#rail{
  pointer-events:all;
  position:absolute;right:.75rem;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:.4rem;
}
.rb{
  width:40px;height:40px;border-radius:10px;
  border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(10px);
  color:var(--dark);font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;transition:all .18s;flex-direction:column;gap:1px;
}
.rb:active{transform:scale(.9);}
.rb-lbl{font-size:.35rem;color:var(--mid);font-weight:500;letter-spacing:.3px;}
.rb.danger{color:#EF4444;}

/* ── CART DRAWER ─────────────────────────────────────────── */
#cart-drawer{
  pointer-events:all;
  position:fixed;bottom:-100%;left:0;right:0;
  background:#fff;border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  padding:0 1rem calc(env(safe-area-inset-bottom,0px)+1rem);
  z-index:300;transition:bottom .3s cubic-bezier(.34,1.1,.64,1);
  max-height:70vh;display:flex;flex-direction:column;
}
#cart-drawer.open{bottom:0;}
#cart-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:.75rem auto .9rem;}
#cart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;padding-bottom:.65rem;border-bottom:1px solid var(--border);}
#cart-title{font-size:1rem;font-weight:700;color:var(--dark);}
#cart-close{font-size:.65rem;color:var(--mid);cursor:pointer;padding:.2rem .5rem;border:1px solid var(--border);border-radius:6px;}
#cart-items{flex:1;overflow-y:auto;}
.ci{display:flex;align-items:center;gap:.75rem;padding:.55rem 0;border-bottom:1px solid var(--border);}
.ci-em{font-size:1.5rem;width:36px;text-align:center;flex-shrink:0;}
.ci-info{flex:1;}
.ci-name{font-size:.82rem;font-weight:600;color:var(--dark);}
.ci-surface{font-size:.58rem;color:var(--mid);margin-top:.1rem;}
.ci-price{font-size:.8rem;font-weight:700;color:var(--accent);margin-left:auto;flex-shrink:0;}
#cart-footer{padding-top:.75rem;border-top:1px solid var(--border);margin-top:.5rem;}
#cart-total{display:flex;justify-content:space-between;margin-bottom:.65rem;}
#cart-total-lbl{font-size:.82rem;color:var(--mid);font-weight:500;}
#cart-total-val{font-size:1rem;font-weight:700;color:var(--dark);}
#checkout-btn{
  width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
  padding:.75rem;font-family:'Inter',sans-serif;font-weight:700;font-size:.85rem;
  cursor:pointer;touch-action:manipulation;transition:background .2s;
}
#checkout-btn:active{background:#1B4D38;}
#cart-empty{font-size:.7rem;color:var(--mid);text-align:center;padding:1.5rem 0;letter-spacing:.5px;}

/* ── FLASH / TOAST ───────────────────────────────────────── */
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:9998;transition:opacity .04s;}
#toast{
  position:fixed;bottom:9.2rem;left:50%;transform:translateX(-50%) translateY(6px);
  font-size:.65rem;font-weight:600;color:var(--dark);
  background:#fff;border:1px solid var(--border);
  border-radius:99px;padding:.38rem 1rem;white-space:nowrap;
  pointer-events:none;z-index:9999;opacity:0;transition:all .22s;
  box-shadow:var(--shadow);
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div id="loader-logo">MIRA <span>HOME</span></div>
  <div id="loader-sub">AR ZONE · FURNITURE PREVIEW</div>
  <div id="loader-bar"><div id="loader-fill"></div></div>
</div>

<!-- HUD -->
<div id="hud">

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="logo">MIRA <span>HOME</span></div>
    <div id="surf-pill"></div>
    <button id="ar-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      View in AR
    </button>
  </div>

  <!-- MODE BAR -->
  <div id="mode-bar">
    <button class="mbt on" id="mb-place">Place</button>
    <button class="mbt" id="mb-move">Move &amp; Rotate</button>
  </div>

  <!-- SCAN UI -->
  <div id="scan-ui">
    <div class="scan-rings">
      <div class="sring sr3"></div><div class="sring sr2"></div><div class="sring sr1"></div>
      <div class="scan-dot"></div>
    </div>
    <div id="scan-lbl">POINT AT A SURFACE<br>FLOOR · WALL · CEILING</div>
  </div>

  <!-- TAP HINT (place mode) -->
  <div id="tap-hint">
    <div style="position:relative;width:48px;height:48px;">
      <div class="hint-ring green"></div>
      <div class="hint-icon">👆</div>
    </div>
    <div class="hint-lbl">TAP TO PLACE</div>
  </div>

  <!-- GRAB HINT (move mode, no object grabbed) -->
  <div id="grab-hint">
    <div style="position:relative;width:48px;height:48px;">
      <div class="hint-ring"></div>
      <div class="hint-icon">✋</div>
    </div>
    <div class="hint-lbl">TAP OBJECT TO SELECT<br>SWIPE TO ROTATE</div>
  </div>

  <!-- PRODUCT PANEL (shown after placing) -->
  <div id="place-panel">
    <div id="pp-top">
      <div>
        <div id="pp-name">—</div>
        <div id="pp-dims">—</div>
        <div id="pp-surface">—</div>
      </div>
      <div id="pp-price">—</div>
    </div>
    <div id="pp-variants"></div>
    <div id="pp-actions">
      <button class="pp-btn" id="btn-add-cart">🛒 Add to Cart</button>
      <button class="pp-btn" id="btn-wishlist">♡ Save</button>
    </div>
    <div id="rotate-hint" style="display:none">Swipe left/right on the model to rotate · Use ±  to resize</div>
  </div>

  <!-- RIGHT RAIL -->
  <div id="rail">
    <div><button class="rb" id="rb-undo">↩<div class="rb-lbl">UNDO</div></button></div>
    <div><button class="rb" id="rb-plus">＋<div class="rb-lbl">SIZE</div></button></div>
    <div><button class="rb" id="rb-minus">－<div class="rb-lbl">SIZE</div></button></div>
    <div><button class="rb" id="rb-photo">📸<div class="rb-lbl">PHOTO</div></button></div>
    <div><button class="rb danger" id="rb-clear">✕<div class="rb-lbl">CLEAR</div></button></div>
  </div>

  <!-- TRAY -->
  <div id="tray">
    <div id="tray-header">
      <div id="tray-label">FURNITURE</div>
      <div id="tray-right">
        <div id="placed-lbl">Placed <strong id="pcnt">0</strong></div>
        <div id="list-btn">🛒 Cart <span id="cart-count">0</span></div>
      </div>
    </div>
    <div id="cards"></div>
  </div>

</div><!-- /hud -->

<!-- CART DRAWER -->
<div id="cart-drawer">
  <div id="cart-handle"></div>
  <div id="cart-head">
    <div id="cart-title">Cart</div>
    <div id="cart-close">Close</div>
  </div>
  <div id="cart-items"><div id="cart-empty">No items yet</div></div>
  <div id="cart-footer">
    <div id="cart-total">
      <div id="cart-total-lbl">Total</div>
      <div id="cart-total-val">₱0</div>
    </div>
    <button id="checkout-btn">Proceed to Checkout →</button>
  </div>
</div>

<div id="flash"></div>
<div id="toast"></div>

<script>
(function(){
'use strict';

// ── CATALOG ──────────────────────────────────────────────────
var CATALOG=[
  {id:'sofa',      name:'Rattan Sofa',       price:8500, dims:'160×75×85 cm', surface:'floor',   em:'🛋️', variants:['#C4956A','#8B6343','#D4B896'], fn:mkSofa},
  {id:'armchair',  name:'Rattan Armchair',   price:3200, dims:'75×70×85 cm',  surface:'floor',   em:'🪑', variants:['#C4956A','#8B6343','#5C3D1E'], fn:mkArmchair},
  {id:'table',     name:'Coffee Table',      price:2800, dims:'110×55×45 cm', surface:'floor',   em:'🪵', variants:['#C4956A','#8B6343'],           fn:mkCoffeeTable},
  {id:'shelf',     name:'Floor Shelf',       price:3500, dims:'80×30×150 cm', surface:'floor',   em:'📚', variants:['#C4956A','#8B6343','#D4B896'], fn:mkFloorShelf},
  {id:'stool',     name:'Rattan Stool',      price:1200, dims:'40×40×45 cm',  surface:'floor',   em:'🪑', variants:['#C4956A','#8B6343'],           fn:mkStool},
  {id:'wallshelf', name:'Wall Shelf',        price:1800, dims:'60×20×15 cm',  surface:'wall',    em:'🗄️', variants:['#C4956A','#8B6343','#D4B896'], fn:mkWallShelf},
  {id:'wallclock', name:'Rattan Clock',      price:950,  dims:'40×5×40 cm',   surface:'wall',    em:'🕐', variants:['#C4956A','#8B6343','#1a1a1a'], fn:mkWallClock},
  {id:'mirror',    name:'Rattan Mirror',     price:2200, dims:'50×5×70 cm',   surface:'wall',    em:'🪞', variants:['#C4956A','#8B6343'],           fn:mkWallMirror},
  {id:'pendant',   name:'Pendant Lamp',      price:2400, dims:'40×40×60 cm',  surface:'ceiling', em:'💡', variants:['#C4956A','#8B6343','#fff8e7'], fn:mkPendantLamp},
  {id:'hangplant', name:'Hanging Planter',   price:1100, dims:'25×25×35 cm',  surface:'ceiling', em:'🪴', variants:['#C4956A','#2d5a1b','#8B6343'], fn:mkHangingPlant},
];

// ── MATERIALS ────────────────────────────────────────────────
var activeVC=null;
function ratMat(c,r,m){return new THREE.MeshStandardMaterial({color:c||0xC4956A,roughness:r||.75,metalness:m||.05});}
function cushMat(c){return new THREE.MeshStandardMaterial({color:c||0x8B7355,roughness:.9,metalness:0});}
function getVC(def){return activeVC?parseInt(activeVC.replace('#','0x')):parseInt(def.replace('#','0x'));}

// ── 3D BUILDERS ──────────────────────────────────────────────
function mkSofa(){
  var g=new THREE.Group(),vc=getVC('#C4956A');
  var base=new THREE.Mesh(new THREE.BoxGeometry(.55,.12,.28),ratMat(vc));base.position.y=.06;g.add(base);
  var seat=new THREE.Mesh(new THREE.BoxGeometry(.52,.08,.24),cushMat(0xA0785A));seat.position.y=.14;g.add(seat);
  var back=new THREE.Mesh(new THREE.BoxGeometry(.55,.3,.05),ratMat(vc));back.position.set(0,.24,-.115);g.add(back);
  var bcush=new THREE.Mesh(new THREE.BoxGeometry(.5,.26,.04),cushMat(0xA0785A));bcush.position.set(0,.24,-.09);g.add(bcush);
  [-1,1].forEach(function(s){var arm=new THREE.Mesh(new THREE.BoxGeometry(.05,.18,.28),ratMat(vc));arm.position.set(s*.3,.1,0);g.add(arm);});
  [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(function(p){var leg=new THREE.Mesh(new THREE.CylinderGeometry(.012,.012,.06,6),ratMat(vc*.8));leg.position.set(p[0]*.25,.03,p[1]*.12);g.add(leg);});
  return g;
}
function mkArmchair(){

function setHL(obj,on){

    if(!c.isMesh)return;
    if(on){
      if(!c.userData._oe){c.userData._oe=c.material.emissive?c.material.emissive.clone():new THREE.Color(0,0,0);c.userData._oi=c.material.emissiveIntensity||0;}
      c.material=c.material.clone();c.material.emissive=new THREE.Color(0x2D6A4F);c.material.emissiveIntensity=.3;
    }else{
      if(c.userData._oe){c.material=c.material.clone();c.material.emissive=c.userData._oe;c.material.emissiveIntensity=c.userData._oi;}
    }
  });
}

// ── SCENE ────────────────────────────────────────────────────
function initScene(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.005,50);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.xr.enabled=true;
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.domElement.style.cssText='position:fixed;inset:0;z-index:1;';
  document.body.insertBefore(renderer.domElement,document.getElementById('hud'));

  scene.add(new THREE.AmbientLight(0xffffff,.8));
  var sun=new THREE.DirectionalLight(0xffffff,1.1);sun.position.set(2,4,2);sun.castShadow=true;scene.add(sun);
  scene.add(new THREE.HemisphereLight(0xffffff,0x888888,.4));

  buildReticles();
  window.addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

  // Touch for rotation in move mode
  renderer.domElement.addEventListener('touchstart',onTouchStart,{passive:true});
  renderer.domElement.addEventListener('touchmove',onTouchMove,{passive:true});
  renderer.domElement.addEventListener('touchend',onTouchEnd,{passive:true});
}

function makeReticle(color){
  var g=new THREE.Group();g.matrixAutoUpdate=false;g.visible=false;
  g.add(new THREE.Mesh(new THREE.RingGeometry(.07,.085,40).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:color,side:THREE.DoubleSide,depthWrite:false})));
  g.add(new THREE.Mesh(new THREE.CircleGeometry(.01,20).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:color,side:THREE.DoubleSide,depthWrite:false})));
  var blob=new THREE.Mesh(new THREE.CircleGeometry(.09,32).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:.16,side:THREE.DoubleSide,depthWrite:false}));blob.position.y=-.001;g.add(blob);
  scene.add(g);return g;
}
function buildReticles(){
  reticleFloor  =makeReticle(0x52B788);
  reticleWall   =makeReticle(0xF59E0B);
  reticleCeiling=makeReticle(0x60A5FA);

// ── PREVIEW ──────────────────────────────────────────────────
function startPreview(){
  prevActive=true;
  CATALOG.forEach(function(m,i){var obj=m.fn();var a=(i/CATALOG.length)*Math.PI*2;obj.position.set(Math.cos(a)*1.4,-.45,Math.sin(a)*1.4-4.5);obj.scale.setScalar(.7);scene.add(obj);prevObjs.push(obj);});
  camera.position.set(0,0,0);camera.lookAt(0,-.45,-4.5);
  var t=0;
  function loop(){if(!prevActive)return;prevRAF=requestAnimationFrame(loop);t+=.004;prevObjs.forEach(function(o,i){o.rotation.y+=.008;o.position.y=-.45+Math.sin(t+i*.7)*.07;});renderer.render(scene,camera);}
  loop();
}
function stopPreview(){prevActive=false;if(prevRAF){cancelAnimationFrame(prevRAF);prevRAF=null;}prevObjs.forEach(function(o){scene.remove(o);});prevObjs=[];}

// ── AR SESSION ───────────────────────────────────────────────
function enterAR(){
  if(!navigator.xr){toast('WebXR not supported');return;}
  navigator.xr.requestSession('immersive-ar',{
    requiredFeatures:['hit-test'],
    optionalFeatures:['dom-overlay'],
    domOverlay:{root:document.getElementById('hud')}
  }).then(function(session){
    xrSession=session;
    renderer.xr.setReferenceSpaceType('local');
    renderer.xr.setSession(session).then(function(){
      session.requestReferenceSpace('local').then(function(ls){
        xrRefSpace=ls;
        session.requestReferenceSpace('viewer').then(function(vs){
          var ready=0;
          function tryReady(){ready++;if(ready===3)onARReady(session);}
          try{
            session.requestHitTestSource({space:vs,offsetRay:new XRRay({x:0,y:0,z:0,w:1},{x:0,y:0,z:-1,w:0})}).then(function(s){hitSrcCenter=s;tryReady();}).catch(tryReady);
            session.requestHitTestSource({space:vs,offsetRay:new XRRay({x:0,y:0,z:0,w:1},{x:0,y:-.766,z:-.643,w:0})}).then(function(s){hitSrcDown=s;tryReady();}).catch(tryReady);
            session.requestHitTestSource({space:vs,offsetRay:new XRRay({x:0,y:0,z:0,w:1},{x:0,y:.766,z:-.643,w:0})}).then(function(s){hitSrcUp=s;tryReady();}).catch(tryReady);
          }catch(e){
            session.requestHitTestSource({space:vs}).then(function(s){hitSrcCenter=s;hitSrcDown=null;hitSrcUp=null;onARReady(session);}).catch(function(e2){toast('Hit-test error: '+e2.message);session.end();});
          }
        });
      });
    });
  }).catch(function(e){toast('Could not start AR: '+e.message);});
}

function onARReady(session){
  session.addEventListener('end',onSessionEnd);
  session.addEventListener('select',onTap);
  stopPreview();
  document.getElementById('ar-btn').classList.add('gone');
  document.getElementById('mode-bar').classList.add('show');
  setStatus('Point your camera at a surface');
  showScan(true);showTapHint(false);showGrabHint(false);
  setModeUI('place');
  renderer.setAnimationLoop(arLoop);
}

function onSessionEnd(){
  renderer.setAnimationLoop(null);
  if(grabbedEntry){setHL(grabbedEntry.obj,false);grabbedEntry=null;}
  hitSrcCenter=hitSrcDown=hitSrcUp=null;xrRefSpace=null;xrSession=null;
  lastHitPos=null;surfaceFound=false;
  hideReticles();
  document.getElementById('ar-btn').classList.remove('gone');
  document.getElementById('mode-bar').classList.remove('show');
  setSurfPill('');
  hidePanel();
  setStatus('');
  showScan(false);showTapHint(false);showGrabHint(false);
  startPreview();
}

// ── SURFACE CLASSIFY ─────────────────────────────────────────
function classify(m){var ny=m[5];if(ny>0.35)return 'floor';if(ny<-0.35)return 'ceiling';return 'wall';}

// ── AR LOOP ──────────────────────────────────────────────────
function arLoop(ts,frame){
  if(!frame){renderer.render(scene,camera);return;}
  var camDir=new THREE.Vector3();camera.getWorldDirection(camDir);
  var camPos=new THREE.Vector3();camera.getWorldPosition(camPos);
  var bestPos=null,bestMat=null,bestType=null,bestScore=-999;

  function evalSrc(src){
    if(!src||!xrRefSpace)return;
    var hits=frame.getHitTestResults(src);
    if(!hits.length)return;
    var pose=hits[0].getPose(xrRefSpace);if(!pose)return;
    var m=pose.transform.matrix;
    var type=classify(m);
    var pos=new THREE.Vector3(m[12],m[13],m[14]);
    var toHit=new THREE.Vector3().subVectors(pos,camPos).normalize();
    var score=toHit.dot(camDir);
    if(camDir.y>0.3&&type==='ceiling')score+=.5;
    else if(camDir.y<-0.3&&type==='floor')score+=.5;
    else if(Math.abs(camDir.y)<0.3&&type==='wall')score+=.3;
    if(score>bestScore){bestScore=score;bestPos=pos;bestMat=m;bestType=type;}
  }
  evalSrc(hitSrcCenter);evalSrc(hitSrcDown);evalSrc(hitSrcUp);

  if(bestPos&&bestType){
    lastHitPos=bestPos;lastSurfType=bestType;lastHitMat4=new THREE.Matrix4().fromArray(bestMat);
    var activeR=bestType==='floor'?reticleFloor:bestType==='wall'?reticleWall:reticleCeiling;
    hideReticles();
    if(mode==='place'||(mode==='move'&&grabbedEntry)){activeR.visible=true;activeR.matrix.fromArray(bestMat);}
    setSurfPill(bestType);
    if(mode==='move'&&grabbedEntry){
      grabbedEntry.obj.position.copy(bestPos);
      grabbedEntry.baseY=bestPos.y;
      if(grabbedEntry.label){grabbedEntry.label.position.set(bestPos.x,bestPos.y+.35,bestPos.z);}
    }
    if(!surfaceFound){
      surfaceFound=true;showScan(false);
      if(mode==='place'){showTapHint(true);setStatus('Tap to place '+surfLabel(bestType));}
      else if(!grabbedEntry){showGrabHint(true);setStatus('Tap an object to grab it');}
    }else{
      if(mode==='place'&&surfaceFound)setStatus('Tap to place '+surfLabel(bestType));
    }
  }else{
    hideReticles();lastHitPos=null;
    if(surfaceFound){surfaceFound=false;showTapHint(false);showGrabHint(false);showScan(true);setStatus('Point your camera at a surface');}
  }

  // Gentle idle animation for non-grabbed floor objects
  var t=ts*.001;
  placed.forEach(function(e,i){
    if(e===grabbedEntry)return;
    if(e.surfType==='floor')e.obj.position.y=e.baseY+Math.sin(t*1.1+i*.8)*.008;
  });

  renderer.render(scene,camera);
}

// ── TAP ──────────────────────────────────────────────────────
function onTap(){
  if(mode==='place') doPlace();
  else doGrab();
}

function doPlace(){
  if(!selId){toast('Select a furniture item first');return;}
  if(!lastHitPos){toast('No surface detected — keep scanning');return;}
  var def=CATALOG.find(function(m){return m.id===selId;});
  if(!def)return;

  // Set variant color before building
  activeVC=def.variants[def._selVariant||0]||null;
  var obj=def.fn();
  activeVC=null;

  // Position
  obj.position.copy(lastHitPos);
  obj.userData.baseY=lastHitPos.y;

  // Orient to surface
  obj.rotation.set(0,0,0);
  if(lastSurfType==='wall'&&lastHitMat4){
    var m=lastHitMat4.elements;
    var n=new THREE.Vector3(m[4],m[5],m[6]).normalize();
    var q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),n);
    obj.quaternion.copy(q);
  }else if(lastSurfType==='ceiling'){
    obj.rotation.set(Math.PI,0,0);
  }

  obj.scale.setScalar(userScale);

  // Price label sprite
  var lbl=makePriceLabel(def.name,def.price);
  lbl.position.set(lastHitPos.x,lastHitPos.y+.35,lastHitPos.z);
  scene.add(lbl);

  scene.add(obj);
  var entry={obj:obj,def:def,label:lbl,baseY:lastHitPos.y,surfType:lastSurfType,userRot:0};
  placed.push(entry);
  lastEntry=entry;
  updateCount();

  // Pop-in
  var sv=0,tgt=userScale;
  var iv=setInterval(function(){sv=Math.min(sv+.07,1);obj.scale.setScalar(tgt*(1-Math.pow(1-sv,3)));if(sv>=1)clearInterval(iv);},14);

  showPanel(entry);
  toast(def.em+' '+def.name+' placed!');
}

function doGrab(){
  if(grabbedEntry){
    // Drop
    setHL(grabbedEntry.obj,false);
    grabbedEntry=null;
    showGrabHint(true);
    setStatus('Tap an object to grab it');
    hidePanel();
    toast('Placed ✓');
    return;
  }
  if(!placed.length){toast('No furniture placed yet');return;}
  var camPos=new THREE.Vector3();var camDir=new THREE.Vector3();
  camera.getWorldPosition(camPos);camera.getWorldDirection(camDir);
  var best=null,bestSc=Infinity;
  placed.forEach(function(e){
    var toObj=new THREE.Vector3().subVectors(e.obj.position,camPos);
    var dist=toObj.length();if(dist<.05)return;
    toObj.normalize();
    var dot=toObj.dot(camDir);if(dot<.3)return;
    var sc=Math.acos(Math.min(1,dot))*3+dist*.05;
    if(sc<bestSc){bestSc=sc;best=e;}
  });
  if(!best){toast('Point your camera at a furniture item');return;}
  grabbedEntry=best;lastEntry=best;
  setHL(grabbedEntry.obj,true);
  showGrabHint(false);
  showPanel(grabbedEntry);
  setStatus('Move phone to reposition · swipe to rotate · tap to drop');
  toast('Selected: '+best.def.name);
}

// ── TOUCH ROTATION (move mode) ────────────────────────────────
function onTouchStart(e){
  if(mode!=='move'||!grabbedEntry)return;
  touchStartX=e.touches[0].clientX;touchRotating=true;
}
function onTouchMove(e){
  if(!touchRotating||!grabbedEntry)return;
  var dx=e.touches[0].clientX-touchStartX;
  grabbedEntry.obj.rotation.y+=dx*.008;
  grabbedEntry.userRot=grabbedEntry.obj.rotation.y;
  touchStartX=e.touches[0].clientX;
}
function onTouchEnd(){touchRotating=false;}

// ── PRODUCT PANEL ────────────────────────────────────────────
function showPanel(entry){
  var d=entry.def;
  document.getElementById('pp-name').textContent=d.name;
  document.getElementById('pp-price').textContent='₱'+d.price.toLocaleString();
  document.getElementById('pp-dims').textContent='📐 '+d.dims;
  var sp=document.getElementById('pp-surface');
  sp.textContent={floor:'▭ Floor',wall:'▮ Wall',ceiling:'▭ Ceiling'}[entry.surfType];
  sp.className=entry.surfType;

  // Variants
  var vrow=document.getElementById('pp-variants');vrow.innerHTML='';
  d.variants.forEach(function(c,i){
    var dot=document.createElement('div');dot.className='vdot'+(i===(d._selVariant||0)?' on':'');
    dot.style.background=c;
    dot.addEventListener('click',function(){
      d._selVariant=i;
      document.querySelectorAll('.vdot').forEach(function(v,vi){v.classList.toggle('on',vi===i);});
      // Rebuild object with new variant
      var oldObj=entry.obj;var oldLbl=entry.label;
      activeVC=c;var newObj=d.fn();activeVC=null;
      newObj.position.copy(oldObj.position);newObj.rotation.copy(oldObj.rotation);newObj.scale.copy(oldObj.scale);
      newObj.userData.baseY=oldObj.userData.baseY;
      scene.remove(oldObj);scene.add(newObj);entry.obj=newObj;
      if(grabbedEntry===entry)setHL(newObj,true);
      toast('Color changed');
    });
    vrow.appendChild(dot);
  });

  // Wishlist button state
  var wb=document.getElementById('btn-wishlist');
  wb.className='pp-btn'+(wishSet[d.id]?' wished':'');
  wb.textContent=wishSet[d.id]?'♥ Saved':'♡ Save';

  // Show rotate hint only in move mode
  document.getElementById('rotate-hint').style.display=mode==='move'?'block':'none';
  document.getElementById('place-panel').classList.add('show');
}
function hidePanel(){document.getElementById('place-panel').classList.remove('show');}

// ── VARIANT CHANGE COLORS EXISTING OBJECT ─────────────────────
// (done inline in showPanel click handler above)

// ── MODE ─────────────────────────────────────────────────────
function setModeUI(m){
  mode=m;
  document.getElementById('mb-place').classList.toggle('on',m==='place');
  document.getElementById('mb-move').classList.toggle('on',m==='move');
  if(grabbedEntry){setHL(grabbedEntry.obj,false);grabbedEntry=null;}
  hidePanel();hideReticles();
  if(m==='place'){
    showGrabHint(false);
    if(surfaceFound){showTapHint(true);setStatus('Tap to place '+surfLabel(lastSurfType));}
    else{showScan(true);setStatus('Point your camera at a surface');}
  }else{
    showTapHint(false);
    if(surfaceFound){showGrabHint(true);setStatus('Tap an object to grab it');}
    else{showScan(true);setStatus('Point your camera at a surface');}
  }
}

// ── CART ─────────────────────────────────────────────────────
function addToCart(entry){
  if(!entry)return;
  cart.push({def:entry.def});
  updateCartCount();
  toast('🛒 '+entry.def.name+' added to cart!');
}
function updateCartCount(){
  var n=cart.length;
  document.getElementById('cart-count').textContent=n;
}
function openCart(){
  var wrap=document.getElementById('cart-items');
  if(!cart.length){wrap.innerHTML='<div id="cart-empty">No items yet</div>';document.getElementById('cart-total-val').textContent='₱0';document.getElementById('cart-drawer').classList.add('open');return;}
  wrap.innerHTML='';
  var total=0;
  cart.forEach(function(c,i){
    var d=c.def;total+=d.price;
    var item=document.createElement('div');item.className='ci';
    item.innerHTML='<div class="ci-em">'+d.em+'</div><div class="ci-info"><div class="ci-name">'+d.name+'</div><div class="ci-surface">'+{floor:'Floor',wall:'Wall',ceiling:'Ceiling'}[d.surface]+'</div></div><div class="ci-price">₱'+d.price.toLocaleString()+'</div>';
    wrap.appendChild(item);
  });
  document.getElementById('cart-total-val').textContent='₱'+total.toLocaleString();
  document.getElementById('cart-drawer').classList.add('open');
}
function toggleWish(entry){
  if(!entry)return;
  var id=entry.def.id;
  wishSet[id]=!wishSet[id];
  var wb=document.getElementById('btn-wishlist');
  wb.className='pp-btn'+(wishSet[id]?' wished':'');
  wb.textContent=wishSet[id]?'♥ Saved':'♡ Save';
  toast(wishSet[id]?'Saved to wishlist':'Removed from wishlist');
}

// ── SCREENSHOT ───────────────────────────────────────────────
function takeShot(){
  var fl=document.getElementById('flash');fl.style.opacity='1';setTimeout(function(){fl.style.opacity='0';},80);
  setTimeout(function(){
    var canvas=renderer.domElement;
    try{
      var url=canvas.toDataURL('image/png');
      var a=document.createElement('a');a.href=url;a.download='mira-ar-preview.png';a.click();
      toast('Photo saved!');
    }catch(e){toast('Screenshot saved to gallery');}
  },60);
}

// ── UI HELPERS ────────────────────────────────────────────────
function setStatus(t){
  // no dedicated status bar — use scan label
  if(document.getElementById('scan-lbl'))document.getElementById('scan-lbl').textContent=t||'POINT AT A SURFACE\nFLOOR · WALL · CEILING';
}
function showScan(v){document.getElementById('scan-ui').classList.toggle('show',v);}
function showTapHint(v){document.getElementById('tap-hint').classList.toggle('show',v);}
function showGrabHint(v){document.getElementById('grab-hint').classList.toggle('show',v);}
function setSurfPill(type){
  var el=document.getElementById('surf-pill');
  if(!type){el.className='';el.classList.remove('show');el.textContent='';return;}
  el.className=type;el.classList.add('show');
  el.textContent={floor:'Floor',wall:'Wall',ceiling:'Ceiling'}[type]||'';
}
function surfLabel(t){return {floor:'on floor',wall:'on wall',ceiling:'on ceiling'}[t]||'';}
function updateCount(){document.getElementById('pcnt').textContent=placed.length;}
var toastT;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('on');},2600);}

// ── BUILD TRAY ────────────────────────────────────────────────
function buildTray(){
  var wrap=document.getElementById('cards');
  CATALOG.forEach(function(def){
    var card=document.createElement('div');card.className='card';card.dataset.id=def.id;
    card.innerHTML='<div class="cem">'+def.em+'</div>'+'<div class="cnm">'+def.name+'</div>'+'<div class="cpr">₱'+def.price.toLocaleString()+'</div>'+'<div class="cdot '+def.surface+'"></div>';
    card.addEventListener('click',function(){
      if(selId===def.id){
        // Toggle off
        selId=null;card.classList.remove('sel');
        hidePanel();toast('Deselected');
      }else{
        document.querySelectorAll('.card').forEach(function(c){c.classList.remove('sel');});
        card.classList.add('sel');selId=def.id;
        toast(def.em+' '+def.name+' · ₱'+def.price.toLocaleString());
      }
    });
    wrap.appendChild(card);
  });
}

// ── BUTTONS ──────────────────────────────────────────────────
function bindButtons(){
  document.getElementById('rb-undo').addEventListener('click',function(){
    if(!placed.length)return;
    var e=placed.pop();
    if(e===grabbedEntry){setHL(e.obj,false);grabbedEntry=null;showGrabHint(false);}
    scene.remove(e.obj);if(e.label)scene.remove(e.label);
    if(lastEntry===e)lastEntry=placed[placed.length-1]||null;
    updateCount();hidePanel();toast('↩ Removed');
  });
  document.getElementById('rb-plus').addEventListener('click',function(){
    if(grabbedEntry){var s=Math.min(grabbedEntry.obj.scale.x+.12,4);grabbedEntry.obj.scale.setScalar(s);toast('Bigger');}
    else{userScale=Math.min(userScale+.2,4);toast('Next size: '+userScale.toFixed(1)+'×');}
  });
  document.getElementById('rb-minus').addEventListener('click',function(){
    if(grabbedEntry){var s=Math.max(grabbedEntry.obj.scale.x-.12,.15);grabbedEntry.obj.scale.setScalar(s);toast('Smaller');}
    else{userScale=Math.max(userScale-.2,.25);toast('Next size: '+userScale.toFixed(1)+'×');}
  });
  document.getElementById('rb-photo').addEventListener('click',takeShot);
  document.getElementById('rb-clear').addEventListener('click',function(){
    if(grabbedEntry){setHL(grabbedEntry.obj,false);grabbedEntry=null;}
    placed.forEach(function(e){scene.remove(e.obj);if(e.label)scene.remove(e.label);});
    placed=[];lastEntry=null;updateCount();hidePanel();toast('All cleared');
  });
  document.getElementById('ar-btn').addEventListener('click',enterAR);
  document.getElementById('mb-place').addEventListener('click',function(){if(xrSession)setModeUI('place');});
  document.getElementById('mb-move').addEventListener('click',function(){if(xrSession)setModeUI('move');});
  document.getElementById('btn-add-cart').addEventListener('click',function(){addToCart(lastEntry);});
  document.getElementById('btn-wishlist').addEventListener('click',function(){toggleWish(lastEntry);});
  document.getElementById('list-btn').addEventListener('click',openCart);
  document.getElementById('cart-close').addEventListener('click',function(){document.getElementById('cart-drawer').classList.remove('open');});
  document.getElementById('checkout-btn').addEventListener('click',function(){toast('Proceeding to checkout…');document.getElementById('cart-drawer').classList.remove('open');});
}

// ── AR CHECK ─────────────────────────────────────────────────
function checkAR(){
  if(!navigator.xr){markNA();return;}
  navigator.xr.isSessionSupported('immersive-ar').then(function(ok){if(!ok)markNA();}).catch(markNA);
}
function markNA(){
  var btn=document.getElementById('ar-btn');btn.innerHTML='⚠ AR Not Available';btn.classList.add('na');
  btn.onclick=function(){toast('Requires Chrome on Android with ARCore');};
}

// ── DEEP LINK ─────────────────────────────────────────────────
function handleDeepLink(){
  var pid=new URLSearchParams(window.location.search).get('product');
  if(!pid)return;
  var card=document.querySelector('[data-id="'+pid+'"]');
  if(card){card.click();card.scrollIntoView({inline:'center',behavior:'smooth'});}
}

// ── LOADER ───────────────────────────────────────────────────
function runLoader(cb){
  var fill=document.getElementById('loader-fill'),p=0;
  var iv=setInterval(function(){p+=5+Math.random()*10;fill.style.width=Math.min(p,100)+'%';if(p>=100){clearInterval(iv);setTimeout(cb,120);}},45);
}

// ── BOOT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',function(){
  runLoader(function(){
    try{initScene();buildTray();bindButtons();checkAR();handleDeepLink();startPreview();}
    catch(e){console.error(e);document.getElementById('loader').innerHTML='<p style="color:red;font-family:monospace;padding:2rem">'+e.message+'</p>';return;}
    var ld=document.getElementById('loader');ld.style.opacity='0';setTimeout(function(){ld.remove();},400);
  });
});

})();
</script>
