<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Zone</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
:root{--neon:#00FFB2;--orange:#FF8C00;--blue:#4488FF;--red:#FF2D6B;--dark:#070A0E;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--dark);color:#fff;font-family:'Syne',sans-serif;height:100vh;overflow:hidden;user-select:none;}

#loader{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
#loader h1{font-size:clamp(2rem,8vw,3.5rem);font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,var(--neon),#fff,var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#loader p{font-family:'Space Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.35);margin-top:.4rem;letter-spacing:3px;}
.lbar{width:160px;height:2px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-top:1.8rem;}
.lbar-fill{height:100%;background:var(--neon);width:0;transition:width .08s;}

#hud{position:fixed;inset:0;z-index:10;pointer-events:none;}

#topbar{pointer-events:all;position:absolute;top:0;left:0;right:0;padding:1rem 1.2rem;background:linear-gradient(to bottom,rgba(7,10,14,.92),transparent);display:flex;align-items:center;justify-content:space-between;gap:.6rem;}
.logo{font-weight:800;font-size:1.1rem;letter-spacing:-1px;flex-shrink:0;}.logo b{color:var(--neon);}
.badge{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:1px;border:1px solid rgba(0,255,178,.3);border-radius:99px;padding:.22rem .65rem;color:var(--neon);transition:all .3s;flex-shrink:0;}
.badge.warn{color:var(--red);border-color:rgba(255,45,107,.35);}

/* SURFACE TYPE indicator */
#surf-type{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:1px;border-radius:99px;padding:.22rem .65rem;transition:all .3s;flex-shrink:0;border:1px solid transparent;}
#surf-type.floor{color:var(--neon);border-color:rgba(0,255,178,.3);}
#surf-type.wall{color:var(--orange);border-color:rgba(255,140,0,.35);}
#surf-type.ceiling{color:var(--blue);border-color:rgba(68,136,255,.35);}

#status-wrap{position:absolute;top:3.8rem;left:50%;transform:translateX(-50%);pointer-events:none;}
#status-text{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:1.5px;color:rgba(255,255,255,.5);background:rgba(7,10,14,.55);backdrop-filter:blur(6px);border-radius:99px;padding:.3rem .9rem;border:1px solid rgba(255,255,255,.06);white-space:nowrap;}

/* MODE PILL */
#mode-pill{pointer-events:all;position:absolute;top:5rem;left:50%;transform:translateX(-50%);display:none;border-radius:99px;overflow:hidden;border:1px solid rgba(255,255,255,.1);background:rgba(7,10,14,.8);backdrop-filter:blur(10px);}
#mode-pill.show{display:flex;}
.mpb{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:1.2px;padding:.38rem .85rem;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.4);transition:all .2s;touch-action:manipulation;}
.mpb.on{background:var(--neon);color:#000;font-weight:700;}

/* SCAN UI */
#scan-ui{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:.8rem;opacity:0;transition:opacity .4s;}
#scan-ui.show{opacity:1;}
.rings{position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1.5px solid var(--neon);animation:rp 2s ease-in-out infinite;}
.r1{width:36px;height:36px;}.r2{width:60px;height:60px;animation-delay:.25s;opacity:.6;}.r3{width:88px;height:88px;animation-delay:.5s;opacity:.3;}
.ch{width:12px;height:12px;position:relative;}
.ch::before,.ch::after{content:'';position:absolute;background:var(--neon);}
.ch::before{width:2px;height:12px;left:5px;top:0;}.ch::after{width:12px;height:2px;top:5px;left:0;}
@keyframes rp{0%,100%{transform:scale(1);}50%{transform:scale(.9);opacity:.3;}}
.scan-lbl{font-family:'Space Mono',monospace;font-size:.56rem;color:rgba(255,255,255,.45);letter-spacing:2px;text-align:center;line-height:1.8;}

/* PLACE HINT — adapts color per surface type */
#tap-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:.6rem;opacity:0;transition:opacity .4s;}
#tap-hint.show{opacity:1;}
.tap-ring{width:52px;height:52px;border-radius:50%;border:2px solid var(--tap-color,var(--neon));animation:ping 1.5s ease-out infinite;}
@keyframes ping{0%{box-shadow:0 0 0 0 var(--tap-glow,rgba(0,255,178,.5));}70%{box-shadow:0 0 0 16px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
.tap-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-size:1.3rem;}
.tap-lbl{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:2px;}

/* MOVE / GRAB */
#move-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:.7rem;opacity:0;transition:opacity .4s;text-align:center;}
#move-hint.show{opacity:1;}
.move-ring{width:56px;height:56px;border-radius:50%;border:2px dashed var(--neon);animation:spin 3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.move-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-size:1.3rem;}
.move-lbl{font-family:'Space Mono',monospace;font-size:.53rem;color:var(--neon);letter-spacing:1.2px;max-width:200px;line-height:1.8;}

#grabbed-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;display:none;flex-direction:column;align-items:center;gap:.6rem;}
#grabbed-indicator.show{display:flex;}
.grab-ring{width:60px;height:60px;border-radius:50%;border:2px solid var(--neon);box-shadow:0 0 20px rgba(0,255,178,.4);animation:grab-pulse 1s ease-in-out infinite;}
@keyframes grab-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(.94);}}
.grab-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-size:1.2rem;}
.grab-lbl{font-family:'Space Mono',monospace;font-size:.53rem;color:var(--neon);letter-spacing:1.2px;}

/* RAIL */
#rail{pointer-events:all;position:absolute;right:.9rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:.5rem;}
.rb{width:46px;height:46px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(7,10,14,.85);backdrop-filter:blur(10px);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:all .18s;}
.rb:active{transform:scale(.9);}
.rb:hover{border-color:var(--neon);}
.rb.red:hover{border-color:var(--red);}
.rl{font-family:'Space Mono',monospace;font-size:.42rem;color:rgba(255,255,255,.25);text-align:center;margin-top:-.25rem;}

/* TRAY */
#tray{pointer-events:all;position:absolute;bottom:0;left:0;right:0;padding:.8rem 1rem calc(env(safe-area-inset-bottom,0px) + 1rem);background:linear-gradient(to top,rgba(7,10,14,.96) 55%,transparent);}
.tray-hd{display:flex;justify-content:space-between;margin-bottom:.5rem;}
.tray-lbl{font-family:'Space Mono',monospace;font-size:.52rem;color:rgba(255,255,255,.28);letter-spacing:3px;}
#pcnt-lbl{font-family:'Space Mono',monospace;font-size:.52rem;color:rgba(255,255,255,.28);}
#pcnt-lbl span{color:var(--neon);font-weight:700;}
#cards{display:flex;gap:.5rem;overflow-x:auto;scrollbar-width:none;}
#cards::-webkit-scrollbar{display:none;}
.card{flex-shrink:0;width:68px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:.45rem .35rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.28rem;touch-action:manipulation;transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.card:active{transform:scale(.9);}
.card.sel{border-color:var(--neon);background:rgba(0,255,178,.07);transform:translateY(-4px);box-shadow:0 0 18px rgba(0,255,178,.16);}
.card .em{font-size:1.4rem;line-height:1;}
.card .nm{font-family:'Space Mono',monospace;font-size:.48rem;color:rgba(255,255,255,.45);text-align:center;}
.card.sel .nm{color:var(--neon);}

#enter-ar{pointer-events:all;position:absolute;bottom:9rem;left:50%;transform:translateX(-50%);background:var(--neon);color:#000;border:none;border-radius:99px;padding:.85rem 2rem;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;box-shadow:0 0 32px rgba(0,255,178,.4);transition:all .25s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:.45rem;white-space:nowrap;touch-action:manipulation;}
#enter-ar:hover{transform:translateX(-50%) scale(1.04);}
#enter-ar:active{transform:translateX(-50%) scale(.95);}
#enter-ar.gone{display:none;}
#enter-ar.na{background:rgba(255,45,107,.12);color:var(--red);border:1px solid rgba(255,45,107,.35);box-shadow:none;}

#toast{position:fixed;bottom:8.5rem;left:50%;transform:translateX(-50%) translateY(8px);font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:1px;color:var(--neon);background:rgba(0,255,178,.1);border:1px solid rgba(0,255,178,.3);border-radius:99px;padding:.4rem 1rem;white-space:nowrap;pointer-events:none;z-index:9999;opacity:0;transition:all .22s;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9997;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px);}
</style>
</head>
<body>

<div id="loader">
  <h1>AR ZONE</h1>
  <p>SPATIAL ENGINE</p>
  <div class="lbar"><div class="lbar-fill" id="lfill"></div></div>
</div>

<div id="hud">
  <div id="topbar">
    <div class="logo">AR <b>ZONE</b></div>
    <div id="surf-type"></div>
    <div class="badge" id="badge">● READY</div>
  </div>
  <div id="status-wrap"><span id="status-text">SELECT A MODEL · TAP ENTER AR</span></div>

  <div id="mode-pill">
    <button class="mpb on" id="mp-place">＋ PLACE</button>
    <button class="mpb" id="mp-move">✥ MOVE</button>
  </div>

  <div id="scan-ui">
    <div class="rings">
      <div class="ring r3"></div><div class="ring r2"></div><div class="ring r1"></div>
      <div class="ch"></div>
    </div>
    <div class="scan-lbl">POINT AT ANY SURFACE<br>FLOOR · WALL · CEILING</div>
  </div>

  <div id="tap-hint">
    <div style="position:relative;width:52px;height:52px;">
      <div class="tap-ring"></div><div class="tap-icon">👆</div>
    </div>
    <div class="tap-lbl" id="tap-lbl-text" style="color:var(--neon);">TAP TO PLACE</div>
  </div>

  <div id="move-hint">
    <div style="position:relative;width:56px;height:56px;">
      <div class="move-ring"></div><div class="move-icon">✥</div>
    </div>
    <div class="move-lbl">POINT AT OBJECT<br>TAP TO GRAB</div>
  </div>

  <div id="grabbed-indicator">
    <div style="position:relative;width:60px;height:60px;">
      <div class="grab-ring"></div><div class="grab-icon">✊</div>
    </div>
    <div class="grab-lbl">MOVE PHONE · TAP TO DROP</div>
  </div>

  <div id="rail">
    <div><button class="rb" id="b-undo">↩</button><div class="rl">UNDO</div></div>
    <div><button class="rb" id="b-up">⊕</button><div class="rl">BIGGER</div></div>
    <div><button class="rb" id="b-dn">⊖</button><div class="rl">SMALLER</div></div>
    <div><button class="rb red" id="b-clr">✕</button><div class="rl">CLEAR</div></div>
  </div>

  <div id="tray">
    <div class="tray-hd">
      <div class="tray-lbl">MODEL</div>
      <div id="pcnt-lbl">PLACED <span id="pcnt">0</span></div>
    </div>
    <div id="cards"></div>
  </div>

  <button id="enter-ar">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    ENTER AR
  </button>
</div>

<div id="toast"></div>

<script>
(function(){
'use strict';

// ── MODELS ──────────────────────────────────────────────────────
var MODELS=[
  {id:'cube',   name:'Cube',   em:'📦', fn:mkCube},
  {id:'sphere', name:'Sphere', em:'🔮', fn:mkSphere},
  {id:'torus',  name:'Torus',  em:'🍩', fn:mkTorus},
  {id:'rocket', name:'Rocket', em:'🚀', fn:mkRocket},
  {id:'gem',    name:'Crystal',em:'💎', fn:mkGem},
  {id:'pyra',   name:'Pyramid',em:'🔺', fn:mkPyramid},
  {id:'tree',   name:'Tree',   em:'🌲', fn:mkTree},
  {id:'ring',   name:'Ring',   em:'💍', fn:mkRing},
];
function mat(c,m,r,x){return new THREE.MeshStandardMaterial(Object.assign({color:c,metalness:m||0,roughness:r||.5},x||{}));}
function mkCube(){var g=new THREE.Group();var m=new THREE.Mesh(new THREE.BoxGeometry(.18,.18,.18),mat(0x5599ff,.4,.3));m.position.y=.09;m.castShadow=true;g.add(m);return g;}
function mkSphere(){var g=new THREE.Group();var m=new THREE.Mesh(new THREE.SphereGeometry(.1,32,32),mat(0xff44cc,.7,.15));m.position.y=.1;m.castShadow=true;g.add(m);return g;}
function mkTorus(){var g=new THREE.Group();var m=new THREE.Mesh(new THREE.TorusGeometry(.1,.036,16,48),mat(0x44ffaa,.5,.2));m.rotation.x=Math.PI/2;m.position.y=.04;m.castShadow=true;g.add(m);return g;}
function mkRocket(){
  var g=new THREE.Group();
  var body=new THREE.Mesh(new THREE.CylinderGeometry(.032,.032,.15,12),mat(0xff8833,.5,.25));body.position.y=.105;body.castShadow=true;g.add(body);
  var nose=new THREE.Mesh(new THREE.ConeGeometry(.032,.08,12),mat(0xffffff,.2,.5));nose.position.y=.215;nose.castShadow=true;g.add(nose);
  [-1,1].forEach(function(s){var f=new THREE.Mesh(new THREE.BoxGeometry(.007,.052,.045),mat(0xff3333));f.position.set(s*.042,.048,0);f.castShadow=true;g.add(f);});
  return g;
}
function mkGem(){var g=new THREE.Group();var m=new THREE.Mesh(new THREE.OctahedronGeometry(.11,0),mat(0x99bbff,.95,.02,{transparent:true,opacity:.82}));m.position.y=.11;m.castShadow=true;g.add(m);return g;}
function mkPyramid(){var g=new THREE.Group();var m=new THREE.Mesh(new THREE.ConeGeometry(.12,.2,4),mat(0xffdd44,.25,.45));m.position.y=.1;m.castShadow=true;g.add(m);return g;}
function mkTree(){
  var g=new THREE.Group();
  var trunk=new THREE.Mesh(new THREE.CylinderGeometry(.016,.02,.08,8),mat(0x8B5E3C));trunk.position.y=.04;g.add(trunk);
  [[.09,.13,.09,0x236b3a],[.075,.1,.16,0x2f9650],[.055,.08,.22,0x44bb66]].forEach(function(l){var c=new THREE.Mesh(new THREE.ConeGeometry(l[0],l[1],8),mat(l[3]));c.position.y=l[2];c.castShadow=true;g.add(c);});
  return g;
}
function mkRing(){
  var g=new THREE.Group();
  var r=new THREE.Mesh(new THREE.TorusGeometry(.08,.016,12,40),mat(0xffcc44,.92,.04));r.rotation.x=Math.PI/2;r.position.y=.016;g.add(r);
  var gem=new THREE.Mesh(new THREE.OctahedronGeometry(.024),mat(0x55aaff,.85,.02));gem.position.y=.085;g.add(gem);
  return g;
}

function setHighlight(obj,on){
  obj.traverse(function(child){
    if(!child.isMesh)return;
    if(on){
      if(!child.userData._origEm){child.userData._origEm=child.material.emissive?child.material.emissive.clone():new THREE.Color(0,0,0);child.userData._origEi=child.material.emissiveIntensity||0;}
      child.material=child.material.clone();child.material.emissive=new THREE.Color(0x00ffb2);child.material.emissiveIntensity=.4;
    } else {
      if(child.userData._origEm){child.material=child.material.clone();child.material.emissive=child.userData._origEm;child.material.emissiveIntensity=child.userData._origEi;}
    }
  });
}

// ── STATE ─────────────────────────────────────────────────────
var scene,camera,renderer;
var reticleFloor,reticleWall,reticleCeiling; // 3 reticles, one shown per surface type
var selId=MODELS[0].id;
var placed=[];
var userScale=1.0;
var surfaceFound=false;
var mode='place';
var grabbedObj=null;

var xrSession=null;
var xrRefSpace=null;

// THREE hit-test sources for different ray directions
var hitSrcCenter=null;   // straight ahead  → walls
var hitSrcDown=null;     // angled down      → floors
var hitSrcUp=null;       // angled up        → ceilings

// Current best hit result
var lastHitPos=null;       // THREE.Vector3
var lastHitNormal=null;    // THREE.Vector3 — surface normal from hit matrix
var lastSurfaceType='floor'; // 'floor' | 'wall' | 'ceiling'
var lastHitMatrix4=null;    // THREE.Matrix4

var prevObjs=[],prevActive=false,prevRAF=null;

// ── SCENE INIT ─────────────────────────────────────────────────
function initScene(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.005,50);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.xr.enabled=true;
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.domElement.style.cssText='position:fixed;inset:0;z-index:1;';
  document.body.insertBefore(renderer.domElement,document.getElementById('hud'));

  scene.add(new THREE.AmbientLight(0xffffff,.75));
  var sun=new THREE.DirectionalLight(0xffffff,1.2);sun.position.set(2,4,2);sun.castShadow=true;scene.add(sun);
  scene.add(new THREE.HemisphereLight(0xffffff,0x444444,.35));

  buildReticles();
  window.addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
}

function makeReticle(color){
  var g=new THREE.Group();
  g.matrixAutoUpdate=false;g.visible=false;
  g.add(new THREE.Mesh(new THREE.RingGeometry(.07,.085,40).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:color,side:THREE.DoubleSide,depthWrite:false})));
  g.add(new THREE.Mesh(new THREE.CircleGeometry(.01,20).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:color,side:THREE.DoubleSide,depthWrite:false})));
  var blob=new THREE.Mesh(new THREE.CircleGeometry(.09,32).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:.18,side:THREE.DoubleSide,depthWrite:false}));
  blob.position.y=-.001;g.add(blob);
  scene.add(g);
  return g;
}

function buildReticles(){
  reticleFloor   =makeReticle(0x00FFB2); // green  — floor
  reticleWall    =makeReticle(0xFF8C00); // orange — wall
  reticleCeiling =makeReticle(0x4488FF); // blue   — ceiling
}

function hideAllReticles(){
  reticleFloor.visible=false;
  reticleWall.visible=false;
  reticleCeiling.visible=false;
}

// ── PREVIEW ─────────────────────────────────────────────────
function startPreview(){
  prevActive=true;
  MODELS.forEach(function(m,i){var obj=m.fn();var a=(i/MODELS.length)*Math.PI*2;obj.position.set(Math.cos(a)*1.3,-.5,Math.sin(a)*1.3-4);obj.scale.setScalar(.8);scene.add(obj);prevObjs.push(obj);});
  camera.position.set(0,0,0);camera.lookAt(0,-.5,-4);
  var t=0;
  function loop(){if(!prevActive)return;prevRAF=requestAnimationFrame(loop);t+=.005;prevObjs.forEach(function(o,i){o.rotation.y+=.01;o.position.y=-.5+Math.sin(t+i*.8)*.08;});renderer.render(scene,camera);}
  loop();
}
function stopPreview(){prevActive=false;if(prevRAF){cancelAnimationFrame(prevRAF);prevRAF=null;}prevObjs.forEach(function(o){scene.remove(o);});prevObjs=[];}

// ── AR SESSION ───────────────────────────────────────────────
// We request THREE hit-test sources with offset rays:
//   1. Straight ahead (direction: 0,0,-1) — catches walls
//   2. Angled 45° down (direction: 0,-0.7,-0.7 normalised) — catches floors
//   3. Angled 45° up  (direction: 0,+0.7,-0.7 normalised) — catches ceilings
// Each frame we pick the hit result closest to the camera's look direction's surface type.
function enterAR(){
  if(!navigator.xr){toast('WebXR not supported');return;}
  navigator.xr.requestSession('immersive-ar',{
    requiredFeatures:['hit-test'],
    optionalFeatures:['dom-overlay'],
    domOverlay:{root:document.getElementById('hud')}
  }).then(function(session){
    xrSession=session;
    renderer.xr.setReferenceSpaceType('local');
    renderer.xr.setSession(session).then(function(){
      session.requestReferenceSpace('local').then(function(localSpace){
        xrRefSpace=localSpace;
        session.requestReferenceSpace('viewer').then(function(viewerSpace){

          // Request three hit-test sources with different offset rays
          var srcCenter,srcDown,srcUp;

          // 1. Straight ahead — good for walls
          session.requestHitTestSourceWithOFFSETRay
            ? void 0
            : null; // not all browsers support offsetRay — we use plain viewer space and rely on camera tilt

          // We use a single hit-test source from viewer space.
          // The viewer space already points where the camera points.
          // So if you point at a wall, you get wall hits; floor → floor hits.
          // To cover all surfaces we request 3 sources with manually offset rays.
          // offsetRay is a XRRay — supported in Chrome Android ARCore.
          var readyCount=0;
          function tryStart(){readyCount++;if(readyCount===3) onAllReady();}

          try{
            // Ray straight ahead (hits walls)
            session.requestHitTestSource({
              space: viewerSpace,
              offsetRay: new XRRay({x:0,y:0,z:0,w:1},{x:0,y:0,z:-1,w:0})
            }).then(function(s){hitSrcCenter=s;tryStart();}).catch(function(){tryStart();});

            // Ray tilted 50° down from camera (hits floors when looking forward/slightly down)
            session.requestHitTestSource({
              space: viewerSpace,
              offsetRay: new XRRay({x:0,y:0,z:0,w:1},{x:0,y:-.766,z:-.643,w:0})
            }).then(function(s){hitSrcDown=s;tryStart();}).catch(function(){tryStart();});

            // Ray tilted 50° up (hits ceilings when looking forward/slightly up)
            session.requestHitTestSource({
              space: viewerSpace,
              offsetRay: new XRRay({x:0,y:.766,z:-.643,w:0},{x:0,y:.766,z:-.643,w:0})
            }).then(function(s){hitSrcUp=s;tryStart();}).catch(function(){tryStart();});

          } catch(e) {
            // XRRay with offset not available — fall back to single straight viewer hit-test
            console.warn('[AR] offsetRay not supported, using single hit-test source');
            session.requestHitTestSource({space:viewerSpace}).then(function(s){
              hitSrcCenter=s;hitSrcDown=null;hitSrcUp=null;
              onAllReady();
            }).catch(function(e2){toast('Hit-test failed: '+e2.message);session.end();});
          }

          function onAllReady(){
            session.addEventListener('end',onSessionEnd);
            session.addEventListener('select',onTap);
            stopPreview();
            document.getElementById('enter-ar').classList.add('gone');
            document.getElementById('mode-pill').classList.add('show');
            setBadge('● ACTIVE');
            setStatus('POINT AT FLOOR · WALL · OR CEILING');
            showScan(true);showTap(false);showMoveHint(false);showGrabbed(false);
            lastHitPos=null;surfaceFound=false;
            setModeUI('place');
            renderer.setAnimationLoop(arLoop);
          }

        }).catch(function(e){toast('Viewer space error: '+e.message);session.end();});
      }).catch(function(e){toast('Local space error: '+e.message);session.end();});
    }).catch(function(e){toast('setSession error: '+e.message);});
  }).catch(function(e){toast('Could not start AR: '+e.message);});
}

function onSessionEnd(){
  renderer.setAnimationLoop(null);
  if(grabbedObj){setHighlight(grabbedObj,false);grabbedObj=null;}
  hitSrcCenter=hitSrcDown=hitSrcUp=null;
  xrRefSpace=null;xrSession=null;lastHitPos=null;lastHitNormal=null;surfaceFound=false;
  hideAllReticles();
  document.getElementById('enter-ar').classList.remove('gone');
  document.getElementById('mode-pill').classList.remove('show');
  document.getElementById('surf-type').textContent='';
  setBadge('● READY');setStatus('SELECT A MODEL · TAP ENTER AR');
  showScan(false);showTap(false);showMoveHint(false);showGrabbed(false);
  startPreview();
}

// ── CLASSIFY SURFACE FROM HIT MATRIX ────────────────────────
// Extract the Y component of the surface normal from the hit pose matrix.
// Hit pose matrix columns: [right, up, -forward, position]
// Normal of the hit surface = column 1 (up vector of the hit pose) = m[4],m[5],m[6]
// If normal.y > 0.6  → floor (normal pointing up)
// If normal.y < -0.6 → ceiling (normal pointing down)
// Otherwise         → wall (normal mostly horizontal)
function classifySurface(m){
  var ny=m[5]; // Y component of the hit surface normal
  if(ny>0.5) return 'floor';
  if(ny<-0.5) return 'ceiling';
  return 'wall';
}

// ── AR LOOP ─────────────────────────────────────────────────
function arLoop(ts,frame){
  if(!frame){renderer.render(scene,camera);return;}

  var bestHitPos=null,bestMatrix=null,bestType=null;

  // Gather results from all three hit-test sources
  // Priority: pick the hit whose surface normal best aligns with camera look direction
  var camDir=new THREE.Vector3();
  camera.getWorldDirection(camDir);

  function evalSource(src){
    if(!src||!xrRefSpace) return;
    var hits=frame.getHitTestResults(src);
    if(!hits.length) return;
    var pose=hits[0].getPose(xrRefSpace);
    if(!pose) return;
    var m=pose.transform.matrix;
    var type=classifySurface(m);
    var pos=new THREE.Vector3(m[12],m[13],m[14]);

    // Score this hit: prefer hit closest to where camera is pointing
    // Use camera→hit direction alignment
    var camPos=new THREE.Vector3();
    camera.getWorldPosition(camPos);
    var toHit=new THREE.Vector3().subVectors(pos,camPos).normalize();
    var alignment=toHit.dot(camDir); // 1 = perfect alignment

    if(!bestHitPos || alignment > (bestScore||0)){
      bestHitPos=pos;
      bestMatrix=m;
      bestType=type;
      bestScore=alignment;
    }
  }
  var bestScore=null;
  evalSource(hitSrcCenter);
  evalSource(hitSrcDown);
  evalSource(hitSrcUp);

  if(bestHitPos && bestType){
    lastHitPos=bestHitPos;
    lastSurfaceType=bestType;
    lastHitMatrix4=new THREE.Matrix4().fromArray(bestMatrix);

    // Show the right coloured reticle
    hideAllReticles();
    var activeReticle = bestType==='floor'?reticleFloor : bestType==='wall'?reticleWall : reticleCeiling;

    if(mode==='place' || (mode==='move' && grabbedObj)){
      activeReticle.visible=true;
      activeReticle.matrix.fromArray(bestMatrix);
    }

    // Update grabbed object position
    if(mode==='move' && grabbedObj){
      grabbedObj.position.copy(bestHitPos);
      grabbedObj.userData.baseY=bestHitPos.y;
    }

    // Update surface type indicator
    setSurfaceType(bestType);

    if(!surfaceFound){
      surfaceFound=true;
      showScan(false);
      if(mode==='place'){showTap(true);}
      else if(!grabbedObj){showMoveHint(true);}
      updateStatusForSurface(bestType);
    } else {
      updateStatusForSurface(bestType);
    }

  } else {
    hideAllReticles();
    lastHitPos=null;
    if(surfaceFound){
      surfaceFound=false;
      showTap(false);showMoveHint(false);
      if(!grabbedObj){showScan(true);setStatus('POINT AT FLOOR · WALL · OR CEILING');}
      setSurfaceType('');
    }
  }

  // Animate non-grabbed objects
  var t=ts*.001;
  placed.forEach(function(obj,i){
    if(obj===grabbedObj)return;
    obj.userData.rot=(obj.userData.rot||0)+.005;
    obj.rotation.y=obj.userData.rot;
    // Only float on floor objects; wall/ceiling objects stay fixed
    if(obj.userData.surfaceType==='floor' && obj.userData.baseY!==undefined){
      obj.position.y=obj.userData.baseY+Math.sin(t*1.3+i*.9)*.01;
    }
  });

  renderer.render(scene,camera);
}

function updateStatusForSurface(type){
  if(mode==='place'){
    if(type==='floor')   setStatus('FLOOR DETECTED · TAP TO PLACE');
    else if(type==='wall')    setStatus('WALL DETECTED · TAP TO PLACE');
    else if(type==='ceiling') setStatus('CEILING DETECTED · TAP TO PLACE');
  } else if(!grabbedObj){
    setStatus('POINT AT OBJECT · TAP TO GRAB');
  }
}

// ── TAP ─────────────────────────────────────────────────────
function onTap(){
  if(mode==='place') doPlace();
  else doMoveAction();
}

function doPlace(){
  if(!lastHitPos){toast('No surface detected — keep scanning');return;}
  var def=MODELS.find(function(m){return m.id===selId;});
  var obj=def.fn();

  // Position at hit
  obj.position.copy(lastHitPos);
  obj.userData.baseY=lastHitPos.y;
  obj.userData.rot=0;
  obj.userData.surfaceType=lastSurfaceType;

  // Orient object relative to surface normal using the hit matrix
  // For walls/ceiling: align the object so it "sticks" to the surface
  if(lastHitMatrix4 && (lastSurfaceType==='wall'||lastSurfaceType==='ceiling')){
    // Extract the hit pose rotation — but only use it partially
    // We want the object to face out from the wall, not tilt randomly
    var q=new THREE.Quaternion();
    var p=new THREE.Vector3();
    var s=new THREE.Vector3();
    lastHitMatrix4.decompose(p,q,s);

    // Get surface normal (local Y of hit pose = column 1 of matrix)
    var m=lastHitMatrix4.elements;
    var nx=m[4],ny=m[5],nz=m[6]; // surface normal

    if(lastSurfaceType==='wall'){
      // Rotate object so its "up" aligns with surface normal
      // This makes it appear to sit against the wall
      var surfNormal=new THREE.Vector3(nx,ny,nz).normalize();
      var up=new THREE.Vector3(0,1,0);
      var quat=new THREE.Quaternion().setFromUnitVectors(up,surfNormal);
      obj.quaternion.copy(quat);
    } else if(lastSurfaceType==='ceiling'){
      // Flip upside-down
      obj.rotation.set(Math.PI,0,0);
    }
  } else {
    obj.rotation.set(0,0,0);
  }

  obj.scale.setScalar(0);
  scene.add(obj);placed.push(obj);updateCount();
  var emoji=lastSurfaceType==='floor'?'🟢':lastSurfaceType==='wall'?'🟠':'🔵';
  toast(emoji+' '+def.em+' '+def.name+' placed on '+lastSurfaceType+'!');

  // pop-in
  var sv=0,tgt=userScale;
  var iv=setInterval(function(){sv=Math.min(sv+.07,1);obj.scale.setScalar(tgt*(1-Math.pow(1-sv,3)));if(sv>=1)clearInterval(iv);},14);
}

function doMoveAction(){
  if(grabbedObj){
    setHighlight(grabbedObj,false);grabbedObj=null;
    showGrabbed(false);
    if(surfaceFound){showMoveHint(true);setStatus('POINT AT OBJECT · TAP TO GRAB');}
    toast('Dropped ✓');
    return;
  }
  if(!placed.length){toast('No objects placed yet');return;}
  var camPos=new THREE.Vector3();var camDir=new THREE.Vector3();
  camera.getWorldPosition(camPos);camera.getWorldDirection(camDir);
  var best=null,bestScore=Infinity;
  placed.forEach(function(obj){
    var toObj=new THREE.Vector3().subVectors(obj.position,camPos);
    var dist=toObj.length();if(dist<.05)return;
    toObj.normalize();
    var dot=toObj.dot(camDir);if(dot<.3)return;
    var angle=Math.acos(Math.min(1,dot));
    var score=angle*3+dist*.05;
    if(score<bestScore){bestScore=score;best=obj;}
  });
  if(!best){toast('Point your camera directly at an object');return;}
  grabbedObj=best;setHighlight(grabbedObj,true);
  showMoveHint(false);showGrabbed(true);
  setStatus('MOVE PHONE TO REPOSITION · TAP TO DROP');
  toast('Grabbed! Move your phone to any surface');
}

// ── MODE ─────────────────────────────────────────────────────
function setModeUI(m){
  mode=m;
  document.getElementById('mp-place').classList.toggle('on',m==='place');
  document.getElementById('mp-move').classList.toggle('on',m==='move');
  if(grabbedObj){setHighlight(grabbedObj,false);grabbedObj=null;}
  showGrabbed(false);
  hideAllReticles();
  if(m==='place'){
    showMoveHint(false);
    if(surfaceFound){showTap(true);updateStatusForSurface(lastSurfaceType);}
    else{showScan(true);showTap(false);setStatus('POINT AT FLOOR · WALL · OR CEILING');}
  } else {
    showTap(false);
    if(surfaceFound){showMoveHint(true);setStatus('POINT AT OBJECT · TAP TO GRAB');}
    else{showScan(true);showMoveHint(false);setStatus('POINT AT FLOOR · WALL · OR CEILING');}
  }
}

// ── UI HELPERS ─────────────────────────────────────────────
function setBadge(t,w){var b=document.getElementById('badge');b.textContent=t;b.className='badge'+(w?' warn':'');}
function setStatus(t){document.getElementById('status-text').textContent=t;}
function showScan(v){document.getElementById('scan-ui').classList.toggle('show',v);}
function showTap(v){document.getElementById('tap-hint').classList.toggle('show',v);}
function showMoveHint(v){document.getElementById('move-hint').classList.toggle('show',v);}
function showGrabbed(v){document.getElementById('grabbed-indicator').classList.toggle('show',v);}
function updateCount(){document.getElementById('pcnt').textContent=placed.length;}

function setSurfaceType(type){
  var el=document.getElementById('surf-type');
  if(!type){el.textContent='';el.className='';return;}
  var labels={floor:'▭ FLOOR',wall:'▮ WALL',ceiling:'▭ CEILING'};
  el.textContent=labels[type]||'';
  el.className=type;
}

var toastT;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('on');},2800);}

// ── TRAY ───────────────────────────────────────────────────
function buildTray(){
  var wrap=document.getElementById('cards');
  MODELS.forEach(function(m){
    var card=document.createElement('div');card.className='card'+(m.id===selId?' sel':'');
    card.innerHTML='<div class="em">'+m.em+'</div><div class="nm">'+m.name+'</div>';
    card.addEventListener('click',function(){document.querySelectorAll('.card').forEach(function(c){c.classList.remove('sel');});card.classList.add('sel');selId=m.id;toast(m.em+' '+m.name+' selected');});
    wrap.appendChild(card);
  });
}

// ── BUTTONS ───────────────────────────────────────────────
function bindButtons(){
  document.getElementById('b-undo').addEventListener('click',function(){
    if(!placed.length)return;var obj=placed.pop();
    if(obj===grabbedObj){setHighlight(obj,false);grabbedObj=null;showGrabbed(false);}
    scene.remove(obj);updateCount();toast('↩ Removed');
  });
  document.getElementById('b-up').addEventListener('click',function(){
    if(grabbedObj){var s=Math.min(grabbedObj.scale.x+.15,4);grabbedObj.scale.setScalar(s);toast('Scale: '+s.toFixed(2)+'×');}
    else{userScale=Math.min(userScale+.25,4);toast('Next: '+userScale.toFixed(2)+'×');}
  });
  document.getElementById('b-dn').addEventListener('click',function(){
    if(grabbedObj){var s=Math.max(grabbedObj.scale.x-.15,.15);grabbedObj.scale.setScalar(s);toast('Scale: '+s.toFixed(2)+'×');}
    else{userScale=Math.max(userScale-.25,.25);toast('Next: '+userScale.toFixed(2)+'×');}
  });
  document.getElementById('b-clr').addEventListener('click',function(){
    if(grabbedObj){setHighlight(grabbedObj,false);grabbedObj=null;showGrabbed(false);}
    placed.forEach(function(o){scene.remove(o);});placed=[];updateCount();toast('All cleared');
  });
  document.getElementById('enter-ar').addEventListener('click',enterAR);
  document.getElementById('mp-place').addEventListener('click',function(){if(xrSession)setModeUI('place');});
  document.getElementById('mp-move').addEventListener('click',function(){if(xrSession)setModeUI('move');});
}

// ── AR CHECK ──────────────────────────────────────────────
function checkAR(){
  if(!navigator.xr){markNA();return;}
  navigator.xr.isSessionSupported('immersive-ar').then(function(ok){if(!ok)markNA();}).catch(markNA);
}
function markNA(){
  var btn=document.getElementById('enter-ar');btn.innerHTML='⚠ AR NOT AVAILABLE';btn.classList.add('na');
  btn.onclick=function(){toast('Use Chrome on Android with ARCore');};
  setBadge('● NO WEBXR',true);
  setTimeout(function(){toast('Open in Chrome on an ARCore-compatible Android device');},2000);
}

// ── LOADER ────────────────────────────────────────────────
function runLoader(cb){var fill=document.getElementById('lfill'),p=0;var iv=setInterval(function(){p+=5+Math.random()*10;fill.style.width=Math.min(p,100)+'%';if(p>=100){clearInterval(iv);setTimeout(cb,150);}},50);}

// ── BOOT ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',function(){
  runLoader(function(){
    try{initScene();buildTray();bindButtons();checkAR();startPreview();}
    catch(e){console.error(e);document.getElementById('loader').innerHTML='<h1 style="color:#FF2D6B">ERROR</h1><p style="color:rgba(255,255,255,.4);font-family:monospace;font-size:.75rem;margin-top:1rem;max-width:280px;text-align:center">'+e.message+'</p>';return;}
    var ld=document.getElementById('loader');ld.style.opacity='0';setTimeout(function(){ld.remove();},500);
  });
});

})();
</script>
</body>
